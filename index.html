ัติ ราชการที่มีเป้าหมายเพื่อให้เกิดความผาสุก และความเป็นอยู่ของประชาชนมีความสงบ และปลอดภัยของ สังคมส่วนรวมตลอดจนประโยชน์สูงสุดของประเทศ กำหนดให้มีแนวทางบริหารราชการ ดังนี้ 1) กำหนดภารกิจ ของส่ วนราชการต้ องทำไปเพื่ อ ความผาสุ ก ของประชาชน และ สอดคล้องกับแนวนโยบายแห่งรัฐ และ แนวนโยบายของรัฐบาล 2) ต้องปฏิบัติไปโดยความซื่อสัตย์สุจริต สามารถตรวจสอบได้ 3) ก่อนเริ่มดำเนินการ ต้องศึกษาวิเคราะห์ผลดี และผลเสียให้ครบถ้วนด้วยความโปร่งใส ภารกิจใดมีผลกระทบต่อประชาชน ต้องรับฟังความคิดเห็นของประชาชนตระหนักถึงประโยชน์ส่ วนรวม ที่จะได้รับประชาชนตระหนักถึงประโยชน์ส่วนรวมที่จะได้รับ 4) เป็นหน้าที่ต้องรับฟังความคิดเห็น ความพึงพอใจของสังคม และประชาชนที่ได้รับ บริการเพื่อนำมาปรับปรุงเสนอแนะผู้มีอำนาจปรับปรุงให้เหมาะสม 5) พบปัญหาอุปสรรคการดำเนิน การ ให้รีบแก้ไขปัญหาอุปสรรคโดยเร็ว หากพบว่ า ปัญหาอุปสรรคเกิดจากส่วนราชการ ระเบียบ ข้อบังคับ รีบแจ้งให้ส่วนราชการเกี่ยวข้องทราบเพื่อปรับ ปรุ ง โดยเร็ว และแจ้งให้ ก.พ.ร. ทราบด้วย สรุปสาระสำคัญพระราชกฤษฎีกาว่าด้วยหลักเกณฑ์และวิธีการบริหารกิจการบ้านเมืองที่ดี            155 พ.ศ. 2546 และที่แก้ไขเพิ่มเติมถึง (ฉบับที่ 2) พ.ศ. 2562 หมวด 3 การบริหารราชการเพื่อให้เกิดผลสัมฤทธิ์ต่อภารกิจของรัฐ", "มาตรา 9 การบริหารราชการเพื่อให้เกิดผลสัมฤทธิ์ต่อภารกิจของรัฐ ส่วนราชการปฏิบัติดังนี้ 1) ก่อนดำเนินการ ต้องจัดทำแผนปฏิบัติราชการไว้เป็นการล่วงหน้า 2) กำหนดแผนปฏิบัติราชการต้องมีรายละเอียดของขั้นตอนดังนี้ - ระยะเวลา - งบประมาณ - เป้าหมาย - ผลสัมฤทธิ์ - ตัวชี้วัดความสำเร็จของภารกิจ 3) ต้องจัดให้มีการติดตาม และประเมินผลการปฏิบัติตามแผนปฏิบัติราชการซึ่งต้อง สอดคล้องกับมาตรฐานที่ ก.พ.ร. กำหนด 4) การปฏิบัติตามแผนปฏิบัต ิราชการเกิดผลกระทบต่อประชาชนต้องรีบแก้ไข หรือ บรรเทา หรือเปลี่ยนแปลงแผนปฏิบัติราชการให้เหมาะสม มาตรา 12 ประโยชน์ในการปฏิบัติราชการให้เกิดผลสัมฤทธิ์ เพื่อประโยชน์ในการปฏิบัติราชการให้เกิดผลสัมฤทธิ์ ก.พ.ร. อาจเสนอต่อคณะรัฐมนตรีเพื่อ กำหนดมาตรการกำกับการปฏิบัติราชการ โดยวิธีการจัด ทำความตกลงเป็นลายลักษณ์อักษรหรือโดย วิธีการอื่นใด เพื่อแสดงความรับผิดชอบในการปฏิบัติราชการ มาตรา 16 การจัดทำแผนปฏิบัติราชการของส่วนราชการ ก.พ.ร. อาจเสนอต่อ ครม.เพื่อกำหนดมาตรการกำกับการปฏิบัติราชการคำรับรองการปฏิบัติ ราชการ โดยวิธีการจัดทำความตกลงเป็นลายลักษณ์อักษร หรือโดยวิธีอื่นใด ให้ส่วนราชการจัดทำแผนปฏิบัติราชการของส่วนราชการนั้น >>> โดยจัดทำเป็นแผนห้าปี ซึ่ง ต้องสอดคล้องกับ ยุทธศาสตร์ชาติ แผนแม่บท แผนการปฏิรูปประเทศ แผนพัฒนาเศรษฐกิจและสังคม แห่งชาติ นโยบายของคณะรัฐมนตรีที่แถลงต่อรัฐสภา และแผนอื่นที่เกี่ยวข้อง ในวาระเริ่มแรก การจัดทำแผนปฏิบัติราชการของส่วนราชการเป็นแผนห้าปีตามมาตรา 16 แห่งพระราชกฤษฎีกาว่าด้วยหลักเกณฑ์และวิธี การบริ หารกิจ การบ้านเมืองที่ด ี พ.ศ. 2546 ซึ่งแก้ไ ข เพิ่มเติมโดยพระราชกฤษฎีกานี้ ให้จ ัดทำเป็นแผนสามปีโดยมีห้วงระยะเวลาตั้งแต่ปีงบประมาณ พ.ศ. 2563 ถึงปีงบประมาณ พ.ศ. 2565 ให้ สำนักงบประมาณ และ ก.พ.ร. >> ร่วมกันกำหนดแนวทางการจัดทำแผนการปฏิบัติราชการ การโอนงบประมาณ จากภารกิจ หนึ่งตามแผนการปฏิบัติราชการ ไปดำเนินการอย่างอื่น ซึ่งมีผลทำให้ ภารกิจเดิมไม่บรรลุเป้าหมาย หรือนำไปใช้ในภารกิจใหม่ที่มิได้กำหนดในแผนการปฏิบัติราชการ จะกระทำ ได้ต่อเมื่อ....ได้รับอนุมัติจากคณะรัฐมนตรีให้ปรับแผนการปฏิบัติราชการ การปรับแผนการปฏิบัติ ราชการ กุล เท่ดัานัดแปลง ้น พิมพ์จำหน่ จาก IPายAddress แจกจ่า: ย110.164.194.141 โดยไม่ได้รับอนุญาต", "จะกระทำได้เฉพาะในกรณีที่งาน หรือภารกิจใดไม่อาจดำเนินการตามวัตถุประสงค์ต่อไปได้ หรือหมดความ จำเป็น หรือไม่เป็นประโยชน์ หรือหากดำเนินการต่อไปจะต้องเสียค่าใช้จ่ายเกินความจำเป็น หรือมีความ จำเป็นอย่างอื่นอันไม่อาจหลีกเลี่ยงได้ มาตรา 19 กรณีนายกรัฐมนตรีพ้นตำแหน่ง เมื่อนายกพ้นจากตำแหน่ง ให้หัวหน้าส่วนราชการมีหน้าที่สรุปผลการปฏิบัติราชการ และให้ ข้อมูลต่อนายกรัฐมนตรีคนใหม่ ตามที่นายกรัฐมนตรีคนใหม่สั่งการ ทั้งนี้ เพื่อนายกรัฐมนตรีคนใหม่จ ะได้ ใช้เป็นข้อมูลในการพิจารณากำหนดนโยบายการบริหารราชการแผ่นดินต่อไป", "หมวด 4 การบริหารราชการอย่างมีประสิทธิภาพและเกิดความคุ้มค่าในเชิงภารกิจของรัฐ"]}, {"name": "พ.ร.ฎ.ว่าด้วยการเสนอเรื่องและการประชุมคณะรัฐมนตรี พ.ศ. 2548", "paragraphs": ["ดังกล่าว แจ้งผลการพิจารณาให้ส่วนราชการที่ยื่นคำขอทราบภายในสิบห้าวั น นั บแต่วัน ที่ได้ รับคำขอ 35. ตอบ ค. โดยปกติทำเป็นลายลักษณ์อักษร มาตรา 26 การสั่งราชการโดยปกติให้กระทำเป็นลายลักษณ์อักษร เว้นแต่ในกรณีที่ ผู้บังคับบัญชามีความจำเป็นที่ไม่อาจสั่งเป็นลายลักษณ์อักษรในขณะนั้น จะสั่งราชการด้วย วาจาก็ได้แต่ให้ผู้รับคำสั่งนั้นบันทึกคำสั่งด้วยวาจาไว้เป็นลายลักษณ์อักษรและเมื่อได้ปฏิบัติ กุล เท่ดัานัดแปลง ้น พิมพ์จำหน่ จาก IPายAddress แจกจ่า: ย110.164.194.141 โดยไม่ได้รับอนุญาต", "ราชการตามคำสั่งดังกล่าวแล้ว ให้บันทึกรายงานให้ผู้สั่งราชการทราบ ในบันทึกให้อ้างอิงคำสั่ง ด้วยวาจาไว้ด้วย 36.     ตอบ ข. ปลัดกระทรวง มาตรา 30 ในกระทรวงหนึ่ง ให้เป็นหน้าที่ของปลัดกระทรวงที่จ ะต้องจัดให้ส่วน ราชการภายในกระทรวงที่รับผิดชอบปฏิบัติงานเกี่ยวกับการบริการประชาชนร่ วมกันจัดตั้ง ศูนย์บริการร่วม เพื่ออำนวยความสะดวกแก่ประชาชนในการที่จะต้องปฏิบัติตามกฎหมายหรื อ กฎอื่นใด ทั้งนี้เพื่อให้ประชาชนสามารถติดต่อสอบถาม ขอทราบข้อมูล ขออนุญาต หรือขอ อนุมัติในเรื่องใด ๆ ที่เป็นอำนาจหน้า ที่ข องส่วนราชการในกระทรว งเดียวกัน โดยติดต่อ เจ้าหน้าที่ ณ ศูนย์บริการร่วมเพียงแห่งเดียว 37.     ตอบ ง. ถูกทุกข้อ มาตรา 34 ในกรณีที่มีการยุบเลิก โอน หรือรวมส่วนราชการใดทั้งหมดหรือบางส่วน ห้ามมิให้จัดตั้งส่วนราชการที่มีภารกิจ หรืออำนาจหน้าที่ที่มีลักษณะเดียวกันหรือคล้า ยคลึง กัน กับส่วนราชการดังกล่าวขึ้นอีก เว้นแต่มีเหตุผลและความจำเป็นเพื่อรักษาความมั่นคงของรัฐ หรือเศรษฐกิจของประเทศ หรือรักษาผลประโยชน์ส่วนรวมของประชาชน และโดยได้รับ ความเห็นชอบจาก ก.พ.ร.\" 38.     ตอบ ข. 3 ปี มาตรา 9 ในวาระเริ่มแรก การจัดทำแผนปฏิบัติราชการของส่วนราชการเป็นแผนห้ าปี ตามมาตรา 16 แห่งพระราชกฤษฎีกาว่าด้วยหลักเกณฑ์และวิธีการบริหารกิจการบ้านเมื องที่ดี พ.ศ. 2546 ซึ่งแก้ไขเพิ ่ม เติ มโดยพระราชกฤษฎี ก านี้ ให้จ ัดทำเป็น แผนสามปีโดยมี ห ้ ว ง ระยะเวลา ตั้งแต่ปีงบประมาณ พ.ศ. 2563 ถึงปีงบประมาณ พ.ศ. 2565 39.      ตอบ ค. สำนักงานพัฒนารัฐบาลดิจิทัล (องค์การมหาชน) มาตรา 29 ในการปฏิบัติงานที่เกี่ยวข้องกับการบริการประชาชนหรือการติดต่อ ประสานงานระหว่างส่วนราชการด้วยกัน ให้ส่วนราชการแต่ละแห่งจัดทำแผนภูมิขั้นตอนและ ระยะเวลา การดำเนินการ รวมทั้งรายละเอียดอื่น ๆ ที่เกี่ยวข้องในแต่ละขั้นตอนเปิดเผยไว้ ณ ที่ทำการของส่วนราชการและในระบบเครือข่ายสารสนเทศของส่วนราชการ เพื่อให้ประชาชน หรือผู้ที่เกี่ยวข้องเข้าตรวจดูได้ การบริการประชาชนและการติ ดต่อประสานงานระหว่างส่วนราชการด้ วยกัน ต้อง กระทำโดยใช้แพลตฟอร์มดิจ ิ งนายกรัฐมนตรีชุดเดิมที่ เกี่ยวกับการบริหารราชการ หรือข้าราชการ ที่ออกโดยมิได้อาศัยอำนาจตามกฎหมายใด พร้อมด้วยข้อเสนอแนะว่าสมควรคงคำสั่ งของนายกรัฐมนตรีหรือมติของคณะรัฐมนตรีใน เรื่องนั้นต่อไปหรือไม่ เพียงใด และนำเสนอนายกรัฐมนตรีเพื่อพิจารณาสั่งการหรือดำเนินการ ต่อไปภายในหนึ่งร้อยยี่สิบวันนับแต่วันที่คณะรัฐมนตรีแถลงนโยบายต่อรัฐสภา กุล เท่ดัานัดแปลง ้น พิมพ์จำหน่ จาก IPายAddress แจกจ่า: ย110.164.194.141 โดยไม่ได้รับอนุญาต", "9         ตอบ ข. สำนักเลขาธิการคณะรัฐมนตรี มาตรา 14 ให้สำนักเลขาธิการคณะรัฐมนตรีต รวจสอบคำสั่งของนายกรั ฐมนตรี และมติของคณะรัฐมนตรีที่เกี่ยวกับการเสนอเรื่องต่อคณะรัฐมนตรี การบริหารราชการ และ ข้าราชการ ที่มีผลบังคับอยู่ก่อนวันที่พระราชกฤษฎีกานี้ใช้บังคับ พร้อมกับข้ อเสนอแนะว่า คำสั่งของนายกรัฐมนตรี หรือมติของคณะรัฐมนตรีในเรื่องใดควรยกเลิกหรือปรับปรุงแก้ไขให้ สอดคล้องกับแนวทางตามพระราชกฤษฎีกานี้ โดยต้องดำเนินการให้แล้วเสร็จ ภายในหนึ่ง ปี นับแต่วันที่พระราชกฤษฎีกานี้ใช้บังคับ 10        ตอบ ก. 1 ปีนับแต่วันที่พระราชกฤษฎีกานี้ใช้บังคับ มาตรา 14 ให้สำนักเลขาธิการคณะรัฐมนตรีต รวจสอบคำสั่งของนายกรั ฐมนตรี และมติของคณะรัฐมนตรีที่เกี่ยวกับการเสนอเรื่องต่อคณะรัฐมนตรี การบริหารราชการ และ ข้าราชการ ที่มีผลบังคับอยู่ก่อนวันที่พระราชกฤษฎีกานี้ใช้บังคับ พร้อมกับข้ อเสนอแนะว่า คำสั่งของนายกรัฐมนตรี หรือมติของคณะรัฐมนตรีในเรื่องใดควรยกเลิกหรือปรับปรุงแก้ไขให้ สอดคล้องกับแนวทางตามพระราชกฤษฎีกานี้ โดยต้องดำเนินการให้แล้วเสร็จ ภายในหนึ่ง ปี นับแต่วันที่พระราชกฤษฎีกานี้ใช้บังคับ สรุปสาระสำคัญระเบียบว่าด้วยการรักษาความลับของราชการ พ.ศ.2544และแก้ไขเพิ่มเติม                    189 (ฉบับที่ 2) พ.ศ. 2561 สรุปสาระสำคัญระเบียบว่าด้วยการรักษาความลับของราชการ พ.ศ.2544และแก้ไขเพิ่มเติม (ฉบับที่ 2) พ.ศ. 2561", "ระเบียบว่าด้วยการรักษาความลับของราชการ พ.ศ.2544 ระเบียบว่าด้วยการรักษาความลับของทางราชการ (ฉบับที่ 2) พ.ศ. 2561 ➢ ให้ใช้บังคับเมื่อพ้นกำหนด 120 วันนับแต่วันประกาศในราชกิจจานุเบกษาเป็นต้นไป ข้อ 4 ให้นายกรัฐมนตรี        >> รักษาการตามระเบียบนี้", "ข้อ 5 “ข้อมูลข่าวสารลับ ” คือข้อมูลข่าวสารที่มีคำสั่งไม่ให้เปิดเผยและอยู่ในความครอบครองหรือ ควบคุมดูแลของหน่วยงานของรัฐ ไม่ว่าจะเป็นเรื่องที่เกี่ยวกับการดำเนินงานของรัฐหรือที่ เกี่ ยวกับ เอกชน ซึ่งมีการกำหนดให้มีชั้นความลับเป็น ชั้นลับ ชั้นลับมาก หรือชั้นลับที่สุด ตามระเบียบนี้ โดยคำนึงถึงการ ปฏิบัติหน้าที่ของหน่วยงานของรัฐและประโยชน์แห่งรัฐประกอบกัน “ประโยชน์แห่งรัฐ” คือ การดำเนินงานของรัฐที่เกี่ยวข้องกับประโยชน์สาธารณะหรื อประโยชน์ ของเอกชนประกอบกัน ไม่ว่าจะเป็นเรื่องความมั่นคงของรัฐที่เกี่ยวกับการเมืองภายในประเทศหรือระหว่า ง ประเทศการป้องกันประเทศ เศรษฐกิจ สังคม วิทยาศาสตร์ เทคโนโลยี การพลังงานและสิ่งแวดล้อม “หัวหน้าหน่วยงานของรัฐ” หมายความว่า (1) หัวหน้าส่วนราชการที่มีฐานะเป็นนิติบุคคลสำหรับกระทรวงกลาโหม ให้หมายความรวมถึง หัวหน้าส่วนราชการที่ขึ้นตรงต่อส่วนราชการในสังกัดกระทรวงกลาโหมที่มีฐานะเป็นนิติบุคคลด้วย (2) ผู้ว่าราชการจังหวัด สำหรับราชการส่วนภูมิภาค (3) ผู้ว่าราชการกรุ งเทพมหานคร นายกองค์การบริ หารส่วนจัง หวัด นายกเทศมนตรี นายก องค์การบริหารส่วนตำบล นายกเมืองพัทยา หรือหัวหน้าผู้บริหารองค์กรปกครองส่วนท้อ งถิ่น อื่น ที่มี กฎหมายจัดตั้ง แล้วแต่กรณี สำหรับราชการส่วนท้องถิ่น (4) ผู้ว่าการ ผู้อำนวยการ กรรมการผู้จัดการ ผู้จัดการ หรือบุคคลซึ่งดำรงตำแหน่งผู้บริหารสูงสุด ที่มีอำนาจหน้าที่คล้ายคลึงกันในรัฐวิสาหกิจนั้น สำหรับงานของรัฐวิสาหกิจ (5) ผู้บริหารสูงสุดของหน่วยงานอื่นของรัฐ เช่น อัยการสูงสุด เลขาธิการสำนัก งานศาลยุติ ธ รรม เลขาธิ ก ารสภาผู้ แทนราษฎร เลขาธิ ก ารคณะกรรมการป้อ งกัน และปราบปรามการทุ จ ริต แห่งชาติ ผู้อำนวยการองค์การมหาชน นายกสภาทนายความ “การปรับชั้นความลับ” หมายความว่า การลดหรือเพิ่มชั้นความลับของข้อมูลข่าวสารลับและให้ หมายความรวมถึงการยกเลิกชั้นความลับของข้อมูลข่าวสารลับนั้นด้วย ข้อ 6 ทุก 5 ปีเป็นอย่างน้อย ให้นายกรัฐมนตรีจัดให้มีการทบทวนและพิจ ารณาแก้ไ ขเพิ่ม เติม ระเบียบนี้ กุล เท่ดัานัดแปลง ้น พิมพ์จำหน่ จาก IPายAddress แจกจ่า: ย110.164.194.141 โดยไม่ได้รับอนุญาต", "ข้อ 7 ให้หัวหน้าหน่วยงานของรัฐ >> มีหน้าที่รักษาข้อมูลข่าวสารลับในหน่วยงานของตนและ อาจมอบหมายหน้าที่ดังกล่าวได้ตามความจำเป็นให้ผู้ใต้บังคับบัญชาหรือให้แก่ราชการส่วนภูมิภาคในกรณีที่ สามารถมอบอำนาจได้ตามกฎหมาย ข้อ 8 บุคคลที่จะเข้าถึงข้อมูลข่าวสารลับในชั้นความลับใด จะต้องเป็นบุคคลที่ผู้บังคับบัญชา มอบหมายความไว้วางใจ และให้เข้าถึงข้อมูลข่าวสารลับได้เฉพาะเรื่องที่ได้รับมอบหมายเท่านั้น ข้อ 9 หัวหน้าหน่วยงานของรัฐอาจขอให้องค์การรักษาความปลอดภัยช่วยตรวจสอบประวัติและ พฤติการณ์ของเจ้าหน้าที่ของตนที่เกี่ยวข้องกับชั้นความลับได้ ข้อ 10 ในการดำเนินงานของคณะกรรมการใดๆ ถ้าคณะกรรมการมีมติกำหนดชั้นความลับไว้ เช่นใด ให้เลขานุการดำเนินการตามนั้นและให้หัวหน้าหน่วยงานของรัฐเจ้าสังกัดของเลขานุการดำเนินการ ต่อไปให้ถูกต้องตามระเบียบนี้ด้วย"]}, {"name": "ระเบียบว่าด้วยหลักเกณฑ์และวิธีการเสนอเรื่องต่อคณะรัฐมนตรี พ.ศ. 2548", "paragraphs": ["เดื อ นมี น าคมของทุ ก ปี ต่ อ คณะกรรมการข้ อ มู ล ข่ า วสารของราชการตามแบบที่ นายกรัฐมนตรีกำหนดโดยประกาศในราชกิจจานุเบกษา • เมื่อคณะกรรมการข้อมูลข่าวสารของราชการได้รับ รายงานผลการปฏิบัต ิเกี่ยวกั บ ข้อ มู ล ข่าวสารลับ ให้ตรวจสอบการปฏิบัติต ามรายงานดังกล่าว และรายงานผลการตรวจสอบต่อ นายกรัฐมนตรี ข้อ 30 เมื่อสงสัยว่าบุคคลที่ไม่มีอำนาจหน้าที่เกี่ยวกับข้อมูลข่าวสารลับได้รู้หรืออาจรู้ถึงข้อมูล ข่าวสารลับหรือเมื่อสงสัยว่ามีการละเมิดการรักษาความลับของข้อมูลข่าวสารของราชการ ให้หัวหน้ า หน่วยงานของรัฐแต่งตั้งคณะกรรมการสอบสวนโดยไม่ชักช้า หมวด 4 การดำเนินการ ส่วนที่ 1 การจัดทำ ข้อ 31 ข้อมูลข่าวสารให้แสดงชื่อหน่วยงานของรัฐของ เรื่อง เลขที่ชุด ของจำนวนชุด ทั้งหมด เลขที่หน้าและแสดงชื่อหน่วยงานส่วนย่อยไว้ด้วย ส่วนที่ 2 การสำเนาและการแปล ข้อ 33 การสำเนา การแปลเอกสารหรือการถอดรหัสข้อมูลข่าวสารลับ ต้องบันทึกจำนวนชุด ยศ ชื่อ ตำแหน่ง ผู้ดำเนินการและชื่อหน่วยงานของรัฐ ที่จัดทำไว้ที่ข้อมูลข่าวสารลับฉบับต้นที่ตนครอบครองและที่ ฉบับสำเนา ฉบับคำแปล ฉบับเข้ารหัส หรือฉบับถอดรหัส แล้วแต่กรณีด้วย", "ส่วนที่ 3 การโอน ข้อ 34 การโอนข้อมูลข่าวสารลับระหว่างหน่วยงานของรัฐ หรือการโอนภายในหน่วยงานเดียวกัน ให้เจ้าหน้าที่ผู้โอนและเจ้าหน้าที่ผู้รับโอนจัดทำบันทึกการโอนและการรับโอนข้อมูลข่าวสารลับตามแบบที่ นายกรัฐมนตรีกำหนดโดยประกาศในราชกิจจานุเบกษาไว้เป็นหลักฐาน และให้นายทะเบียนข้อมูลข่าวสาร ลับจดแจ้งการโอนข้อมูลข่าวสารลับดังกล่าวไว้ในทะเบียนควบคุมข้อมูลข่าวสารลับด้วย ข้อ 35 การส่งข้อมูลข่าวสารลับภายในบริเวณหน่วยงานเดียวกันทุกชั้นความลับ ต้องใช้ใบปก ข้อมูลข่าวสารลับปิดทับข้อมูลข่าวสาร ถ้าส่งออกนอกบริเวณหน่วยงานต้องบรรจุซองหรือภาชนะทึ บแสง สองชั้นอย่างมั่นคง บนซองหรือภาชนะชั้นนอกให้จ่าหน้าระบุข้อความเช่นเดียวกับบนซองหรือภาชนะ ชั้นใน แต่ไม่ต้องมีเครื่องหมายแสดงชั้นความลับใดๆ. (ข้อ 36) ข้อ 37 การส่งข้อมูลข่าวสารลับออกนอกบริเวณหน่วยงานภายในประเทศโดยเจ้าหน้าที่น ำสาร ให้หัวหน้าหน่วยงานของรัฐหรือผู้ซึ่งหัวหน้าหน่วยงานของรัฐมอบหมายมีอำนาจอนุญาตให้กระทำได้ และ ให้นายทะเบียนข้อมูลข่าวสารลับลงทะเบียนก่อนส่งออก สรุปสาระสำคัญระเบียบว่าด้วยการรักษาความลับของราชการ พ.ศ.2544และแก้ไขเพิ่มเติม                                193 (ฉบับที่ 2) พ.ศ. 2561 ข้อ 38 เจ้าหน้าที่นำสารและผู้อารักขานำสาร 1. รักษาความปลอดภัยของข้อมูลข่าวสารลับตลอดเวลาที่นำออกนอกบริเวณหน่วยงานและเก็บ รักษาข้อมูลข่าวสารลับที่อยู่ในความดูแลให้ปลอดภัย 2. จัดส่งข้อมูลข่าวสารลับแก่นายทะเบียนข้อมูลข่าวสารลับ ส่วนที่ 5 การเก็บรักษา ➢ ข้อ 44 การเก็บรักษาข้อมูลข่าวสารลับ ให้เป็นไปตามคำแนะนำขององค์การรักษาความปลอดภัย ส่วนที่ 6 การยืม ➢ ข้อ 45 การให้ยืมข้อมูลข่าวสารลับ จะต้องได้รับอนุญาตจากหน่วยงานเจ้าของเรื่องก่อน ให้นาย ทะเบียนทำบันทึกการยืม ส่วนที่ 7 การทำลาย ข้อ 46 การทำลาย ให้ส่งข้อมูลข่าวสารลับให้หอจดหมายเหตุแห่งชาติ พิจ ารณาก่อนว่าไม่มี คุณค่าในการเก็บรักษา ในการสั่งทำลายข้อมูลข่าวสารลับ ให้หัวหน้าหน่วยงานของรัฐแต่งตั้งคณะกรรมการการทำลาย ข้อมูลข่าวสารลับ ประกอบไปด้วย นายทะเบียนข้อมูลข่าวสารลั บ เป็นประธาน และเจ้าหน้า ที่ที่ เกี่ยวข้องอีกไม่น้อยกว่า 2 คน เมื่อทำลายแล้ว ให้จัดทำใบรับรองการทำลายไว้เป็นหลักฐาน ส่วนที่ 9 กรณีสูญหาย ข้อ 48 ในกรณีที่ข้อมูลข่าวสารลับสูญหาย ให้ผู้ทราบข้อเท็จจริงรายงานข้อเท็จจริ งที่ เกี่ย วข้ อง ให้หัวหน้าหน่วยงานของรัฐที่ตนสังกัดทราบเพื่อดำเนินการต่อไปและให้นายทะเบียนข้อมูลข่าวสารลับ บันทึกการที่ข้อมูลข่าวสารลับสูญหายไว้ในทะเบียนควบคุมข้อมูลข่าวสารลับด้วย ส่วนที่ 10 การเปิดเผย ข้ อ 49 ในกรณี ท ี ่ ห ั ว หน้ า หน่ ว ยงานของรั ฐ หรื อ เจ้ า หน้ า ที ่ ข องรั ฐ ตามมาตรา 20 (1) แห่ ง พระราชบัญญัติข้อมูลข่าวสารของราชการ พ.ศ. 2540 มีคำสั่งให้เปิดเผยข้อมูลข่าวสารลับใดโดยมีข้อจำกัด หรือเงื่อนไขเช่นใด ให้เปิดเผยข้อมูลข่าวสารลับนั้นได้ตามข้อจำกัดหรือเงื่อนไขที่กำหนด ข้อ 50 ในกรณีที่ข้อมูลข่าวสารลับใด var wrongHistory = {};

try{ wrongHistory = JSON.parse(localStorage.getItem("wh")||"{}"); }catch(e){}
try{ chapterScores = JSON.parse(localStorage.getItem("cs")||"{}"); }catch(e){}

var currentChapterIdx = 0;
var currentQuestions = [];
var currentIdx = 0;
var score = 0;
var answered = 0;
var userAnswers = {};
var currentMode = "all";

// ── SCREENS ──
function hideAll() {
  ["screen-home","screen-content","screen-reader","screen-quiz","screen-summary"].forEach(function(id){
    var el = document.getElementById(id);
    if(el){ el.style.display="none"; el.classList.remove("active"); }
  });
  document.getElementById("search-wrap").style.display = "block";
}

function showTab(tab) {
  document.querySelectorAll(".tab-btn").forEach(function(b){ b.classList.remove("active"); });
  event.target.classList.add("active");
  hideAll();
  if(tab === "home"){
    document.getElementById("screen-home").style.display = "block";
    renderHome();
  } else {
    document.getElementById("screen-content").style.display = "block";
    renderContentList();
  }
}

function goHome() {
  hideAll();
  document.getElementById("screen-home").style.display = "block";
  document.querySelectorAll(".tab-btn").forEach(function(b,i){ b.classList.toggle("active",i===0); });
  renderHome();
}

// ── HOME ──
function renderHome() {
  var grid = document.getElementById("chapter-list");
  grid.innerHTML = "";
  QUIZ_DATA.forEach(function(ch, idx) {
    var sc = chapterScores[idx];
    var wc = (wrongHistory[idx]||[]).length;
    var card = document.createElement("div");
    card.className = "chapter-card";
    card.style.animationDelay = (idx*0.03)+"s";

    var scoreBadge = sc ? '<span class="badge b-green">'+sc.score+"/"+sc.total+'</span>' : "";
    var wrongInfo = wc ? " &middot; &#10060; "+wc+" ข้อ" : "";

    card.innerHTML =
      '<div class="cc-left"><h3>'+ch.name+'</h3><p>'+
      ch.questions.length+" ข้อ &middot; "+ch.questions.filter(function(q){return q.answer;}).length+
      " ข้อมีเฉลย"+wrongInfo+'</p></div>'+
      '<div class="cc-right">'+scoreBadge+'<span class="badge b-blue">ทำข้อสอบ &#8594;</span></div>';

    card.onclick = function(){ startChapter(idx); };
    grid.appendChild(card);
  });
}

// ── CONTENT LIST ──
function renderContentList() {
  var list = document.getElementById("content-list");
  list.innerHTML = "";
  CONTENT_DATA.forEach(function(ch, idx) {
    var totalChars = ch.paragraphs.reduce(function(a,p){ return a+p.length; }, 0);
    var btn = document.createElement("div");
    btn.className = "content-btn";
    btn.style.animationDelay = (idx*0.03)+"s";
    btn.innerHTML =
      '<div><h3>'+ch.name+'</h3><p>'+ch.paragraphs.length+" ส่วน &middot; "+totalChars.toLocaleString()+" ตัวอักษร</p></div>"+
      '<span style="color:var(--muted);font-size:1.2rem">&#8250;</span>';
    btn.onclick = function(){ openReader(idx); };
    list.appendChild(btn);
  });
}

// ── READER ──
function openReader(idx) {
  currentContentIdx = idx;
  hideAll();
  document.getElementById("search-wrap").style.display = "none";
  document.getElementById("screen-reader").style.display = "block";
  document.getElementById("reader-title").textContent = CONTENT_DATA[idx].name;
  document.getElementById("reader-search").value = "";
  renderReader("");
}

function renderReader(highlight) {
  var ch = CONTENT_DATA[currentContentIdx];
  var container = document.getElementById("reader-body");
  container.innerHTML = "";
  var hl = highlight.toLowerCase();

  ch.paragraphs.forEach(function(para, i) {
    var div = document.createElement("div");
    div.className = "para-block";
    div.style.animationDelay = (i*0.04)+"s";

    if(highlight && para.toLowerCase().indexOf(hl) >= 0) {
      var re = new RegExp("("+escRe(highlight)+")", "gi");
      div.innerHTML = para.replace(re, "<mark>$1</mark>");
    } else if(highlight) {
      div.className += " dimmed";
      div.textContent = para;
    } else {
      div.textContent = para;
    }
    container.appendChild(div);
  });

  if(highlight) {
    var first = container.querySelector("mark");
    if(first) setTimeout(function(){ first.scrollIntoView({behavior:"smooth",block:"center"}); }, 100);
  }
}

function searchInReader() {
  var q = document.getElementById("reader-search").value.trim();
  renderReader(q);
}

function backToContent() {
  hideAll();
  document.getElementById("screen-content").style.display = "block";
  document.querySelectorAll(".tab-btn").forEach(function(b,i){ b.classList.toggle("active",i===1); });
}

// ── GLOBAL SEARCH ──
function escRe(s){ return s.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"); }

document.getElementById("search-input").addEventListener("input", function() {
  var q = this.value.trim();
  var box = document.getElementById("search-results");
  if(q.length < 2){ box.style.display="none"; return; }

  var results = [];
  var ql = q.toLowerCase();

  QUIZ_DATA.forEach(function(ch, ci) {
    ch.questions.forEach(function(qItem) {
      if(qItem.text.toLowerCase().indexOf(ql) >= 0) {
        var snippet = qItem.text.length > 80 ? qItem.text.slice(0,80)+"..." : qItem.text;
        var re = new RegExp("("+escRe(q)+")", "gi");
        results.push({
          type: "&#128221; ข้อสอบ: "+ch.name,
          text: snippet.replace(re, '<span class="hi">$1</span>'),
          action: function(c,n){ return function(){ jumpToQ(c,n); }; }(ci, qItem.num)
        });
      }
    });
  });

  CONTENT_DATA.forEach(function(ch, ci) {
    ch.paragraphs.forEach(function(para) {
      if(para.toLowerCase().indexOf(ql) >= 0) {
        var start = Math.max(0, para.toLowerCase().indexOf(ql)-30);
        var snippet = "..."+para.slice(start, start+90)+"...";
        var re = new RegExp("("+escRe(q)+")", "gi");
        results.push({
          type: "&#128214; เนื้อหา: "+ch.name,
          text: snippet.replace(re, '<span class="hi">$1</span>'),
          action: function(c,kw){ return function(){ openReaderHL(c,kw); }; }(ci, q)
        });
      }
    });
  });

  if(!results.length) {
    box.innerHTML = '<div class="sr-item"><div class="sr-text" style="color:var(--muted)">ไม่พบผลลัพธ์</div></div>';
    box.style.display = "block";
    return;
  }

  var show = results.slice(0,8);
  searchActions = show.map(function(r){ return r.action; });
  var html = "";
  show.forEach(function(r, i) {
    html += '<div class="sr-item" onclick="doSearch('+i+')"><div class="sr-type">'+r.type+'</div><div class="sr-text">'+r.text+'</div></div>';
  });
  if(results.length > 8)
    html += '<div class="sr-item" style="color:var(--muted);font-size:0.79rem">+ อีก '+(results.length-8)+' ผลลัพธ์...</div>';
  box.innerHTML = html;
  box.style.display = "block";
});

function doSearch(i) {
  searchActions[i]();
  document.getElementById("search-results").style.display = "none";
  document.getElementById("search-input").value = "";
}

document.addEventListener("click", function(e) {
  if(!e.target.closest("#search-wrap"))
    document.getElementById("search-results").style.display = "none";
});

function openReaderHL(ci, q) {
  openReader(ci);
  setTimeout(function(){
    document.getElementById("reader-search").value = q;
    renderReader(q);
  }, 80);
}

function jumpToQ(ci, qNum) {
  startChapter(ci);
  setTimeout(function(){
    var idx = currentQuestions.findIndex(function(q){ return q.num===qNum; });
    if(idx >= 0){ currentIdx = idx; renderQuestion(); }
  }, 150);
}

// ── QUIZ ──
function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll(".mode-btn").forEach(function(b){ b.classList.remove("active"); });
  document.getElementById("mode-"+mode).classList.add("active");
}

function startChapter(idx) {
  currentChapterIdx = idx;
  currentMode = "all";
  document.querySelectorAll(".mode-btn").forEach(function(b){ b.classList.remove("active"); });
  document.getElementById("mode-all").classList.add("active");
  hideAll();
  document.getElementById("screen-quiz").style.display = "block";
  document.getElementById("quiz-title").textContent = QUIZ_DATA[idx].name;
  buildQuiz();
}

function buildQuiz() {
  var ch = QUIZ_DATA[currentChapterIdx];
  var qs = ch.questions.slice();
  if(currentMode === "random") {
    qs = qs.sort(function(){ return Math.random()-.5; }).slice(0,20);
  } else if(currentMode === "wrong") {
    var wrong = wrongHistory[currentChapterIdx]||[];
    qs = qs.filter(function(q){ return wrong.indexOf(q.num) >= 0; });
    if(!qs.length){ alert("ยังไม่มีข้อที่เคยตอบผิดในหัวข้อนี้"); return; }
  }
  currentQuestions = qs;
  currentIdx = 0; score = 0; answered = 0; userAnswers = {};
  renderQuestion();
}

function renderQuestion() {
  var q = currentQuestions[currentIdx];
  var total = currentQuestions.length;
  document.getElementById("prog-fill").style.width = (currentIdx/total*100)+"%";
  document.getElementById("prog-text").textContent = "ข้อ "+(currentIdx+1)+"/"+total;
  document.getElementById("score-lbl").textContent = "คะแนน: "+score;
  document.getElementById("stat-mini").textContent = "ตอบแล้ว "+answered+"/"+total;
  document.getElementById("q-num").textContent = "ข้อที่ "+q.num;
  document.getElementById("q-text").textContent = q.text;
  var expl = document.getElementById("expl");
  expl.style.display = "none"; expl.innerHTML = "";
  var nxt = document.getElementById("btn-next");
  nxt.style.display = "none";

  var choicesEl = document.getElementById("choices");
  choicesEl.innerHTML = "";
  Object.keys(q.choices).forEach(function(key) {
    var b = document.createElement("button");
    b.className = "choice-btn";
    b.innerHTML = '<span class="clabel">'+key+'</span><span>'+q.choices[key]+'</span>';
    b.onclick = function(){ selectAnswer(key, q); };
    choicesEl.appendChild(b);
  });
}

function selectAnswer(sel, q) {
  if(userAnswers[q.num] !== undefined) return;
  userAnswers[q.num] = sel;
  answered++;
  var ok = sel === q.answer;
  if(ok) score++;

  if(!wrongHistory[currentChapterIdx]) wrongHistory[currentChapterIdx] = [];
  if(!ok && wrongHistory[currentChapterIdx].indexOf(q.num) < 0)
    wrongHistory[currentChapterIdx].push(q.num);
  if(ok)
    wrongHistory[currentChapterIdx] = wrongHistory[currentChapterIdx].filter(function(n){ return n !== q.num; });
  try{ localStorage.setItem("wh", JSON.stringify(wrongHistory)); }catch(e){}

  document.querySelectorAll(".choice-btn").forEach(function(b) {
    b.disabled = true;
    var k = b.querySelector(".clabel").textContent;
    if(k === q.answer) b.classList.add("correct");
    else if(k === sel && !ok) b.classList.add("wrong");
  });

  if(q.answer) {
    var expl = document.getElementById("expl");
    expl.style.display = "block";
    var ans = q.choices[q.answer] || "";
    expl.innerHTML = "<strong>&#10003; เฉลย: "+q.answer+". "+ans+"</strong>" +
      (q.explanation ? "<br><br>"+q.explanation : "");
  }
  document.getElementById("score-lbl").textContent = "คะแนน: "+score;
  document.getElementById("stat-mini").textContent = "ตอบแล้ว "+answered+"/"+currentQuestions.length;
  var nxt = document.getElementById("btn-next");
  nxt.style.display = "";
  nxt.textContent = currentIdx >= currentQuestions.length-1 ? "ดูผลคะแนน &#127919;" : "ข้อถัดไป &#8594;";
}

function nextQ() {
  if(currentIdx >= currentQuestions.length-1){ showSummary(); return; }
  currentIdx++;
  renderQuestion();
  window.scrollTo({top:0,behavior:"smooth"});
}

function showSummary() {
  hideAll();
  document.getElementById("screen-summary").style.display = "block";
  document.getElementById("search-wrap").style.display = "none";
  var total = currentQuestions.length;
  var pct = Math.round(score/total*100);
  chapterScores[currentChapterIdx] = {score:score, total:total};
  try{ localStorage.setItem("cs", JSON.stringify(chapterScores)); }catch(e){}

  document.getElementById("score-big").textContent = score+"/"+total;
  document.getElementById("score-detail").textContent = pct+"% &middot; ถูก "+score+" &middot; ผิด "+(total-score);
  document.getElementById("grade-msg").textContent =
    pct>=80 ? "&#127942; ยอดเยี่ยม!" : pct>=60 ? "&#128077; ทำได้ดี! ทบทวนข้อที่ผิดด้วย" : "&#128218; ต้องทบทวนเนื้อหาเพิ่ม";

  var list = document.getElementById("rev-list");
  list.innerHTML = "";
  currentQuestions.forEach(function(q) {
    var ua = userAnswers[q.num];
    var ok = ua === q.answer;
    var div = document.createElement("div");
    div.className = "rev-item " + (ok ? "ok" : "bad");
    var qtxt = q.text.length > 70 ? q.text.slice(0,70)+"..." : q.text;
    div.innerHTML =
      '<div class="rev-q">' + (ok?"&#10003;":"&#10007;") + " ข้อ"+q.num+": "+qtxt+"</div>"+
      '<div class="rev-a">ตอบ: <span class="' + (ok?"ans-ok":"ans-bad") + '">' + (ua||"-") + '</span> &nbsp;|&nbsp; เฉลย: <span class="ans-ok">'+q.answer+"</span></div>";
    list.appendChild(div);
  });
}

function restartQuiz() {
  hideAll();
  document.getElementById("screen-quiz").style.display = "block";
  buildQuiz();
}

renderHome();
</script>
