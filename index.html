<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ติวสอบ — สำนักเลขาธิการ ครม.</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Kanit:wght@500;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d1117;--surface:#161b22;--card:#1c2128;--border:#30363d;
  --accent:#58a6ff;--accent2:#f0883e;--accent3:#3fb950;--accent4:#bc8cff;
  --text:#e6edf3;--muted:#8b949e;--correct:#3fb950;--wrong:#f85149;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:"Sarabun",sans-serif;min-height:100vh}

.topbar{
background:var(–surface);border-bottom:1px solid var(–border);
padding:12px 18px;display:flex;align-items:center;gap:12px;
position:sticky;top:0;z-index:100;
}
.topbar-title{
font-family:“Kanit”,sans-serif;font-size:1rem;font-weight:700;
background:linear-gradient(135deg,#58a6ff,#bc8cff);
-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.tab-row{display:flex;gap:3px;background:var(–bg);border-radius:8px;padding:3px;margin-left:auto}
.tab-btn{
padding:6px 14px;border:none;border-radius:6px;cursor:pointer;
font-family:“Sarabun”,sans-serif;font-size:0.85rem;font-weight:500;
background:transparent;color:var(–muted);transition:all .2s;
}
.tab-btn.active{background:var(–card);color:var(–text)}

.search-wrap{padding:14px 18px 0;max-width:860px;margin:0 auto}
.search-inner{position:relative}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(–muted);pointer-events:none}
.search-input{
width:100%;background:var(–surface);border:1.5px solid var(–border);
border-radius:10px;color:var(–text);padding:10px 16px 10px 40px;
font-family:“Sarabun”,sans-serif;font-size:0.93rem;outline:none;transition:border-color .2s;
}
.search-input:focus{border-color:var(–accent)}
.search-results{
background:var(–card);border:1px solid var(–border);border-radius:10px;
margin-top:6px;overflow:hidden;display:none;position:absolute;width:100%;z-index:50;
box-shadow:0 8px 32px rgba(0,0,0,.5);
}
.sr-item{padding:10px 15px;cursor:pointer;border-bottom:1px solid var(–border);transition:background .15s}
.sr-item:last-child{border-bottom:none}
.sr-item:hover{background:var(–surface)}
.sr-type{font-size:0.7rem;color:var(–accent);font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:2px}
.sr-text{font-size:0.87rem;line-height:1.4}
.hi{background:rgba(88,166,255,.3);border-radius:3px;padding:0 2px}

.screen{display:none;padding:14px 18px 60px;max-width:860px;margin:0 auto}
.screen.active{display:block}
.sec-label{color:var(–muted);font-size:0.82rem;margin:12px 0 10px}

.chapter-grid{display:grid;gap:9px}
.chapter-card{
background:var(–card);border:1px solid var(–border);border-radius:13px;
padding:15px 17px;cursor:pointer;transition:all .18s;
display:flex;align-items:center;justify-content:space-between;gap:10px;
}
.chapter-card:hover{border-color:var(–accent);transform:translateY(-1px)}
.cc-left h3{font-family:“Kanit”,sans-serif;font-size:0.93rem;font-weight:700;margin-bottom:3px}
.cc-left p{font-size:0.79rem;color:var(–muted)}
.cc-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.badge{border-radius:20px;padding:3px 11px;font-size:0.77rem;font-weight:600;white-space:nowrap}
.b-blue{background:rgba(88,166,255,.12);border:1px solid rgba(88,166,255,.3);color:var(–accent)}
.b-green{background:rgba(63,185,80,.12);border:1px solid rgba(63,185,80,.3);color:var(–correct)}

.content-btn{
background:var(–card);border:1px solid var(–border);border-radius:12px;
padding:14px 16px;cursor:pointer;display:flex;align-items:center;
justify-content:space-between;margin-bottom:8px;transition:all .18s;
}
.content-btn:hover{border-color:var(–accent4)}
.content-btn h3{font-family:“Kanit”,sans-serif;font-size:0.9rem;font-weight:700;margin-bottom:2px}
.content-btn p{font-size:0.78rem;color:var(–muted)}

#screen-reader{display:none;padding:14px 18px 60px;max-width:760px;margin:0 auto}
.reader-head{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.reader-title{font-family:“Kanit”,sans-serif;font-size:1rem;font-weight:700;flex:1}
.back-btn{
background:none;border:1px solid var(–border);border-radius:8px;
color:var(–muted);padding:6px 12px;cursor:pointer;font-family:“Sarabun”,sans-serif;
font-size:0.82rem;transition:all .2s;
}
.back-btn:hover{border-color:var(–accent);color:var(–accent)}
.para-block{
background:var(–card);border:1px solid var(–border);border-radius:11px;
padding:16px;margin-bottom:9px;line-height:1.85;font-size:0.92rem;
}
.para-block mark{background:rgba(88,166,255,.28);color:var(–text);border-radius:3px;padding:0 2px}
.para-block.dimmed{opacity:0.3}

#screen-quiz{display:none;padding:14px 18px 60px;max-width:700px;margin:0 auto}
.quiz-head{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.quiz-title{font-family:“Kanit”,sans-serif;font-size:0.93rem;font-weight:700;flex:1}
.mode-row{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.mode-btn{
padding:6px 14px;border:1.5px solid var(–border);border-radius:20px;
background:transparent;color:var(–muted);font-family:“Sarabun”,sans-serif;
font-size:0.81rem;cursor:pointer;transition:all .18s;
}
.mode-btn.active{border-color:var(–accent);color:var(–accent);background:rgba(88,166,255,.08)}

.prog-wrap{background:var(–border);border-radius:99px;height:4px;margin-bottom:5px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(–accent),var(–accent4));border-radius:99px;transition:width .4s}
.prog-label{display:flex;justify-content:space-between;font-size:0.76rem;color:var(–muted);margin-bottom:14px}

.q-card{background:var(–card);border:1px solid var(–border);border-radius:13px;padding:20px;margin-bottom:11px}
.q-num{font-size:0.7rem;color:var(–accent);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.q-text{font-size:1rem;font-weight:600;line-height:1.65;margin-bottom:16px}
.choices{display:flex;flex-direction:column;gap:7px}
.choice-btn{
background:var(–surface);border:1.5px solid var(–border);border-radius:9px;
padding:10px 13px;color:var(–text);font-family:“Sarabun”,sans-serif;
font-size:0.92rem;cursor:pointer;text-align:left;transition:all .15s;
display:flex;align-items:flex-start;gap:9px;
}
.choice-btn:hover:not(:disabled){border-color:var(–accent);background:rgba(88,166,255,.06)}
.clabel{
background:var(–border);border-radius:5px;min-width:24px;height:24px;
display:flex;align-items:center;justify-content:center;
font-size:0.75rem;font-weight:700;flex-shrink:0;
}
.choice-btn.correct{border-color:var(–correct);background:rgba(63,185,80,.08)}
.choice-btn.correct .clabel{background:var(–correct);color:#000}
.choice-btn.wrong{border-color:var(–wrong);background:rgba(248,81,73,.08)}
.choice-btn.wrong .clabel{background:var(–wrong);color:#fff}
.choice-btn:disabled{cursor:default}

.expl{
background:rgba(88,166,255,.06);border:1px solid rgba(88,166,255,.2);
border-radius:9px;padding:12px 14px;font-size:0.86rem;line-height:1.72;
margin-top:10px;display:none;
}
.expl strong{color:var(–accent)}

.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:6px}
.stat-mini{font-size:0.78rem;color:var(–muted)}
.btn-next{
padding:8px 20px;background:var(–accent);border:none;border-radius:9px;
color:#000;font-family:“Kanit”,sans-serif;font-size:0.9rem;font-weight:700;
cursor:pointer;display:none;transition:opacity .18s;
}
.btn-next:hover{opacity:.85}

#screen-summary{display:none;padding:14px 18px 60px;max-width:700px;margin:0 auto}
.sum-card{
background:var(–card);border:1px solid var(–border);border-radius:16px;
padding:26px;text-align:center;margin-bottom:12px;
}
.score-big{
font-family:“Kanit”,sans-serif;font-size:3rem;font-weight:800;
background:linear-gradient(135deg,var(–correct),#43e97b);
-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.sum-sub{color:var(–muted);font-size:0.88rem;margin-top:4px;margin-bottom:14px}
.grade-msg{font-size:1rem;font-weight:600}
.rev-label{font-size:0.81rem;color:var(–muted);margin-bottom:7px;font-weight:600}
.rev-list{max-height:50vh;overflow-y:auto;display:flex;flex-direction:column;gap:6px}
.rev-item{
background:var(–surface);border:1px solid var(–border);border-radius:8px;
padding:9px 13px;font-size:0.84rem;
}
.rev-item.ok{border-left:3px solid var(–correct)}
.rev-item.bad{border-left:3px solid var(–wrong)}
.rev-q{font-weight:600;line-height:1.5;margin-bottom:2px}
.rev-a{color:var(–muted);font-size:0.79rem}
.ans-ok{color:var(–correct);font-weight:600}
.ans-bad{color:var(–wrong);font-weight:600}
.btn-restart{
width:100%;padding:12px;background:linear-gradient(135deg,var(–accent),var(–accent4));
border:none;border-radius:10px;color:#fff;font-family:“Kanit”,sans-serif;
font-size:0.95rem;font-weight:700;cursor:pointer;margin-top:11px;
}
.btn-restart:hover{opacity:.85}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.chapter-card,.content-btn,.q-card,.para-block{animation:fadeUp .28s ease both}
@media(max-width:540px){.tab-btn{padding:6px 9px;font-size:0.79rem}}
</style>

</head>
<body>

<div class="topbar">
  <div class="topbar-title">&#128218; ติวสอบ สลค.</div>
  <div class="tab-row">
    <button class="tab-btn active" onclick="showTab('home')">&#127968; หน้าหลัก</button>
    <button class="tab-btn" onclick="showTab('content')">&#128214; เนื้อหา</button>
  </div>
</div>

<div class="search-wrap" id="search-wrap">
  <div class="search-inner">
    <span class="search-icon">&#128269;</span>
    <input class="search-input" id="search-input" type="text"
      placeholder="ค้นหาข้อสอบ เนื้อหา หรือคำสำคัญ...">
    <div class="search-results" id="search-results"></div>
  </div>
</div>

<div class="screen active" id="screen-home">
  <p class="sec-label">เลือกหัวข้อที่ต้องการทำข้อสอบ</p>
  <div class="chapter-grid" id="chapter-list"></div>
</div>

<div class="screen" id="screen-content">
  <p class="sec-label">เลือกหัวข้อที่ต้องการอ่านเนื้อหา</p>
  <div id="content-list"></div>
</div>

<div id="screen-reader">
  <div class="reader-head">
    <button class="back-btn" onclick="backToContent()">&#8592; กลับ</button>
    <div class="reader-title" id="reader-title"></div>
  </div>
  <div style="margin-bottom:12px">
    <div class="search-inner">
      <span class="search-icon">&#128269;</span>
      <input class="search-input" id="reader-search" type="text"
        placeholder="ค้นหาในเนื้อหา..." oninput="searchInReader()">
    </div>
  </div>
  <div id="reader-body"></div>
</div>

<div id="screen-quiz">
  <div class="quiz-head">
    <button class="back-btn" onclick="goHome()">&#8592; กลับ</button>
    <div class="quiz-title" id="quiz-title"></div>
  </div>
  <div class="mode-row">
    <button class="mode-btn active" id="mode-all" onclick="setMode('all')">ทั้งหมด</button>
    <button class="mode-btn" id="mode-rand" onclick="setMode('random')">&#127922; สุ่ม 20 ข้อ</button>
    <button class="mode-btn" id="mode-wrong" onclick="setMode('wrong')">&#10060; ข้อที่เคยผิด</button>
  </div>
  <div class="prog-wrap"><div class="prog-fill" id="prog-fill"></div></div>
  <div class="prog-label">
    <span id="prog-text">ข้อ 1/10</span>
    <span id="score-lbl">คะแนน: 0</span>
  </div>
  <div class="q-card">
    <div class="q-num" id="q-num"></div>
    <div class="q-text" id="q-text"></div>
    <div class="choices" id="choices"></div>
    <div class="expl" id="expl"></div>
  </div>
  <div class="nav-row">
    <div class="stat-mini" id="stat-mini"></div>
    <button class="btn-next" id="btn-next" onclick="nextQ()">ข้อถัดไป &#8594;</button>
  </div>
</div>

<div id="screen-summary">
  <div class="quiz-head">
    <button class="back-btn" onclick="goHome()">&#8592; หน้าหลัก</button>
    <div class="quiz-title">ผลการทำข้อสอบ</div>
  </div>
  <div class="sum-card">
    <div class="score-big" id="score-big"></div>
    <div class="sum-sub" id="score-detail"></div>
    <div class="grade-msg" id="grade-msg"></div>
  </div>
  <div class="rev-label">รายละเอียดทุกข้อ</div>
  <div class="rev-list" id="rev-list"></div>
  <button class="btn-restart" onclick="restartQuiz()">&#128257; ทำข้อสอบชุดนี้อีกครั้ง</button>
</div>

<script>

ือน และสำนักงานพัฒนาระบบราชการมีหน้าที่การตรวจสอบ", "ค": "การเปลี่ยนชื่อส่วนราชการที่มีฐานะเป็นกรมให้ตราเป็นพระราชกฤษฎีกา", "ง": "การยุบส่วนราชการที่มีฐานะเป็นกระทรวงให้ตราเป็นพระราชกฤษฎีกา"}, "answer": "ข", "explanation": "ให้สำนักงานข้าราชการพลเรือน และสำนักงานพัฒนาระบบราชการมีห น้ าที่การ ตรวจสอบดูแลมิให้ส่วนราชการที่มีพระราชกฤษฎีกาให้รวมหรือโอนเข้าด้วยกัน กำหนด ตำแหน่งหรืออัตรากำลังของข้าราชการ หรือลูกจ้างเพิ่มจนกว่าจะครบสามปี นั บแต่วั น ที่ พระราชกฤษฎีกามีผลบังคับใช้ มาตรา 8 ทวิ 4 การรวมหรือการโอนส่วนราชการตามมาต"}, {"num": 8, "text": "ข้อใดกล่าวผิดเกี่ยวกับการยุบเลิกกรม", "choices": {"ก": "จัดทำเป็นพระราชกฤษฎีกา", "ข": "ให้งบประมาณรายจ่ายที่เหลืออยู่ของกรมนั้นตกเป็นงบกลาง", "ค": "ทรัพย์สินอื่นของกรมนั้นให้โอนแก่ส่วนราชการอื่นตามที่กำหนดไว้ในพระราชกฤษฎีกา", "ง": "ข้อ ข. และ ค."}, "answer": "ข", "explanation": "ให้งบประมาณรายจ่ายที่เหลืออยู่ของกรมนั้นตกเป็นงบกลาง มาตรา 8 จัตวา 6 การยุบส่วนราชการตามมาตรา 7 ให้ต ราเป็นพระราชกฤษฎีกาเมื่อมี พระราชกฤษฎีกายุบส่วนราชการตามวรรคหนึ่งแล้ว ให้งบประมาณรายจ่ายที่เหลืออยู่ของส่วน ราชการนั้นเป็นอันระงับไป"}, {"num": 9, "text": "หน่วยงานใดมีหน้าที่ในการตรวจสอบดูแล ส่วนราชการที่จัดตั้งขึ้นใหม่ มิให้มีการกำหนดตำแหน่ง หรือ อัตรากำลังของข้าราชการหรือลูกจ้างเพิ่มขึ้นจนกว่าจะครบสามปี", "choices": {"ก": "สำนักงานพัฒนาระบบราชการ", "ข": "สำนักงานคณะกรรมการข้าราชการพลเรือน", "ค": "สำนักงบประมาณ", "ง": "ข้อ ข. และ ค."}, "answer": "ง", "explanation": "ข้อ ข. และ ค. มาตรา 8 สัตต9 ให้สำนักงานคณะกรรมการข้าราชการพลเรือนและสำนักงบประมาณ ร่วมกันเสนอความเห็นต่อคณะรั ฐมนตรีในการแบ่ งส่วนราชการภายในและในการกำหนด อำนาจหน้ า ที ่ข องแต่ ล ะส่ วนราชการตามมาตรา 8 ฉ ในการเสนอความเห็น ดัง กล่าวให้ สำนักงานคณะกรรมการข้าราชการพลเรือนจัดอัตรากำลัง และสำนักงบประมาณ"}, {"num": 10, "text": "กรณีที่กรมส่งเสริมการปกครองท้องถิ่น หมดความจำเป็น หากต้องการที่จ ะยุ บกรมดังกล่า ว จะต้องตราเป็นกฎหมายใด", "choices": {"ก": "พระราชบัญญัติๆ", "ข": "พระราชกฤษฎีกา", "ค": "พระราชกำหนด", "ง": "กฎกระทรวง"}, "answer": "ข", "explanation": "พระราชกฤษฎีกา มาตรา 8 จัตวา6 การยุบส่วนราชการตามมาตรา 7 ให้ตราเป็นพระราชกฤษฎี ก าเมื่ อ มี พระราชกฤษฎีกายุบส่วนราชการตามวรรคหนึ่งแล้ว ให้งบประมาณรายจ่ายที่เหลืออยู่ของส่วน ราชการนั้นเป็นอันระงับไป สำหรับทรัพย์สินอื่นของส่วนราชการนั้นให้โอนให้แ ก่ส่ วนราชการ กุล เท่ดัานัดแปลง ้น พิมพ์จำหน่ จาก IPายAd"}, {"num": 11, "text": "การแบ่งส่วนราชการภายในกรม จะต้องตราเป็นกฎหมายข้อใด", "choices": {"ก": "พระราชบัญญัติ", "ข": "พระราชกฤษฎีกา", "ค": "พระราชกำหนด", "ง": "กฎกระทรวง"}, "answer": "ง", "explanation": "กฎกระทรวง มาตรา 8 ฉ8 การแบ่งส่วนราชการภายในสำนักงานรัฐมนตรี กรม หรือส่วนราชการที่ เรียกชื่ออย่างอื่นและมีฐานะเป็นกรม ให้ออกเป็นกฎกระทรวงและให้ระบุอำนาจหน้ าที่ข องแต่ ละส่วนราชการไว้ในกฎกระทรวงด้วย"}, {"num": 12, "text": "หากกรมการปกครอง จะเปลี่ยนชื่อเป็นกรมการความมั่นคงภายใน จะต้องตราเป็นกฎหมายใด", "choices": {"ก": "พระราชบัญญัติ", "ข": "พระราชกฤษฎีกา", "ค": "พระราชกำหนด", "ง": "กฎกระทรวง"}, "answer": "ข", "explanation": "พระราชกฤษฎีกา มาตรา 8 ตรี 5 การเปลี่ยนชื่อส่วนราชการตามมาตรา 7 ให้ตราเป็นพระราชกฤษฎีกา และในกรณีที่ชื่อตำแหน่งของข้าราชการในส่วนราชการนั้นเปลี่ยนไปให้ระบุการเปลี่ยนชื่ อไว้ใน พระราชกฤษฎีกาด้วย"}, {"num": 13, "text": "หน่วยงานใดมีหน้าที่เสนอความเห็นต่อคณะรัฐมนตรี ให้แบ่งส่วนราชการภายในของกรมการ ปกครอง", "choices": {"ก": "สำนักงานคณะกรรมการข้าราชการพลเรือน ข. กระทรวงมหาดไทย", "ค": "สำนักงบประมาณ", "ง": "ข้อ ก. และ ค."}, "answer": "ง", "explanation": "ข้อ ก. และ ค. มาตรา 8 สัตต 9 ให้สำนักงานคณะกรรมการข้าราชการพลเรือนและสำนักงบประมาณ ร่วมกันเสนอความเห็นต่อคณะรั ฐมนตรีในการแบ่ งส่วนราชการภายในและในการกำหนด อำนาจหน้ า ที ่ข องแต่ ล ะส่ วนราชการตามมาตรา 8 ฉ ในการเสนอความเห็น ดัง กล่าวให้ สำนักงานคณะกรรมการข้าราชการพลเรือนจัดอัตรากำลัง และสำนักงบประมา"}, {"num": 14, "text": "บุคคลใดเป็นผู้รับผิดชอบในการกำหนดนโยบาย เป้าหมาย และผลสัมฤทธิ์ของงานในสำนั ก นายกรัฐมนตรี", "choices": {"ก": "นายกรัฐมนตรี", "ข": "ปลัดสำนักนายกรัฐมนตรี", "ค": "รัฐมนตรีประจำสำนักนายกรัฐมนตรี", "ง": "ข้อ ก. และ ข. ถูก"}, "answer": "ก", "explanation": "นายกรัฐมนตรี มาตรา 10 สำนักนายกรัฐมนตรีมีอำนาจหน้าที่ตามที่กำหนดไว้ในกฎหมายว่ าด้ วยการ ปรับปรุ ง กระทรวง ทบวง กรม สำนักนายกรั ฐ มนตรีม ีน ายกรั ฐ มนตรีเ ป็ นผู้ บั งคับ บั ญ ชา ข้าราชการและรับผิดชอบในการกำหนดนโยบาย เป้าหมาย และผลสัมฤทธิ์ของงานในสำนัก นายกรัฐมนตรีให้สอดคล้องกับนโยบายที่คณะรัฐมนตรี แ"}, {"num": 15, "text": "ในกรณีที่นายกรัฐมนตรีตาย ขาดคุณสมบัติ ต้องคำพิพากษาให้จำคุก หรือศาลรัฐธรรมนูญวินิจฉัย ว่าความเป็นรัฐมนตรีของนายกสิ้นสุดลงในระหว่างที่รอคณะรัฐมนตรีชุดใหม่เข้ามารับหน้า ที่นั้ น คณะรัฐมนตรีชุดเดิม จะต้องทำอย่างไร", "choices": {"ก": "มอบหมายให้รองนายกรัฐมนตรีคนใดคนหนึ่งรักษาราชการแทนนายกรัฐมนตรี", "ข": "มอบหมายให้รองนายกรัฐมนตรีคนใดคนหนึ่งปฏิบัติหน้าที่แทนนายกรัฐมนตรี", "ค": "มอบหมายให้รองนายกรัฐมนตรีคนใดคนหนึ่งปฏิบัติราชการแทนนายกรัฐมนตรี", "ง": "มอบหมายให้รองนายกรัฐมนตรีคนใดคนหนึ่งปฏิบัติหน้าที่แทนนายกรัฐมนตรีแล้วแต่กรณี"}, "answer": "ข", "explanation": "มอบหมายให้รองนายกรัฐมนตรีคนใดคนหนึ่งปฏิบัติหน้าที่แทนนายกรัฐมนตรี มาตรา 10 ในระหว่างที่คณะรัฐมนตรีต้องอยู่ในตำแหน่งเพื่อปฏิบัติหน้าที่ต่อไปจนกว่า คณะรัฐมนตรีที่ตั้งขึ้นใหม่จะเข้ารับหน้าที่เพราะนายกรัฐมนตรีต าย ขาดคุณสมบัต ิ ต้องคำ พิพากษาให้จ ำคุก สภาผู้แทนราษฎรมีมติไม่ไว้วางใจ ศาลรัฐธรรมนูญวินิจ ฉั"}, {"num": 16, "text": "ข้อใดกล่าวผิดเกี่ยวกับอำนาจหน้าที่ของนายกรัฐมนตรีในฐานะหัวหน้ารัฐบาล", "choices": {"ก": "สั่งให้ราชการส่วนกลางรายงานการปฏิบัติราชการ", "ข": "สั่งให้ราชการส่วนภูมิภาคชี้แจงแสดงความคิดเห็น", "ค": "สั่งให้ราชการส่วนท้องถิ่นรายงานการปฏิบัติราชการ", "ง": "สั่งสอบสวนข้อเท็จจริงเกี่ยวกับการปฏิบัติราชการของราชการส่วนท้องถิ่น"}, "answer": "ค", "explanation": "สั่งให้ราชการส่วนท้องถิ่นรายงานการปฏิบัติราชการ มาตรา 11 นายกรัฐมนตรีในฐานะหัวหน้ารัฐบาลมีอำนาจหน้าที่ดังนี้ (1) กำกับโดยทั่วไปซึ ่ง การบริ หารราชการแผ่นดิน เพื่อการนี้จ ะสั่ง ให้ ราชการ ส่วนกลาง ราชการส่วนภูมิภาค และส่วนราชการซึ่งมีหน้าที่ควบคุมราชการส่วนท้องถิ่น ชี้แจง แสดงความคิดเห็น ทำรายงานเกี่"}, {"num": 17, "text": "นายกรัฐมนตรีสามารถยับยั้งการปฏิบัติราชการของส่วนราชการท้องถิ่นได้ในกรณีใด", "choices": {"ก": "ไม่สามารถยับยั้งเป็นอิสระของราชการส่วนท้องถิ่นตามหลักการปกครองตนเอง", "ข": "ยับยั้งได้หากราชการส่วนท้องถิ่นกระทำการก่อให้เกิดความเสียหายต่อท้องถิ่น", "ค": "กรณีที่ราชการส่วนท้องถิ่นปฏิบัติราชการขัดต่อนโยบายหรือมติของคณะรัฐมนตรี", "ง": "ข้อ ก. และ ค."}, "answer": "ค", "explanation": "กรณีที่ราชการส่วนท้องถิ่นปฏิบัติราชการขัดต่อนโยบายหรือมติของคณะรัฐมนตรี มาตรา 11 นายกรัฐมนตรีในฐานะหัวหน้ารัฐบาลมีอำนาจหน้าที่ดังนี้ (1) กำกับโดยทั่วไปซึ ่ง การบริ หารราชการแผ่นดิน เพื่อการนี้จ ะสั่ง ให้ ราชการ ส่วนกลาง ราชการส่วนภูมิภาค และส่วนราชการซึ่งมีหน้าที่ควบคุมราชการส่วนท้องถิ่น ชี้แจง แสดง"}, {"num": 18, "text": "บุคคลตามข้อใด เป็นข้าราชการการเมือง", "choices": {"ก": "เลขาธิการนายกรัฐมนตรี", "ข": "รองเลขาธิการนายกรัฐมนตรีฝ่ายบริหาร", "ค": "รองเลขาธิการนายกรัฐมนตรีฝ่ายการเมือง", "ง": "ข้อ ก. และ ค. ถูก"}, "answer": "ง", "explanation": "ข้อ ก. และ ค. ถูก มาตรา 13 สำนักเลขาธิการนายกรัฐมนตรี มีอำนาจหน้าที่เกี่ยวกับราชการทางการเมือ ง มีเลขาธิการนายกรัฐมนตรีเป็นผู้บังคับบัญชาข้าราชการ และรับผิดชอบในการปฏิ บัติ ราชการ ขึ้นตรงต่อนายกรัฐมนตรี และให้มีรองเลขาธิการนายกรัฐมนตรีฝ่ายการเมืองและรองเลขาธิการ นายกรัฐมนตรีฝ่ายบริหาร เป็ นผู้ช่วยสั"}, {"num": 19, "text": "บุคคลตามข้อใดต่อไปนี้อาจเป็นข้าราชการการเมืองหรือข้าราชการพลเรือนสามัญก็ได้", "choices": {"ก": "เลขาธิการคณะรัฐมนตรี", "ข": "รองเลขาธิการคณะรัฐมนตรี", "ค": "ผู้ช่วยเลขาธิการคณะรัฐมนตรี", "ง": "ไม่มีข้อใดถูก"}, "answer": "ง", "explanation": "ไม่มีข้อใดถูก มาตรา 14 ตำแหน่งเลขาธิการคณะรัฐมนตรี รองเลขาธิการคณะรัฐมนตรี และผู้ช่วยเลขาธิการ คณะรัฐมนตรี ถูกกำหนดให้เป็นข้าราชการพลเรือนสามัญ"}, {"num": 20, "text": "ข้อใดมิใช่อำนาจของปลัดสำนักนายกรัฐมนตรี", "choices": {"ก": "รับผิดชอบควบคุมราชการประจำในสำนักนายกรัฐมนตรี", "ข": "รับผิดชอบกำหนดแนวทางและแผนปฏิบัติราชการของสำนักนายกรัฐมนตรี", "ค": "เป็นผู้บังคับบัญชาข้าราชการสูงสุดของส่วนราชการในสำนักนายกรัฐมนตรียกเว้นข้ าราชการ", "ง": "เป็นผู้บังคับบัญชาข้าราชการในสำนักงานปลัดสำนักนายกรัฐมนตรี"}, "answer": "ค", "explanation": "เป็นผู้บังคับบัญชาข้าราชการสูงสุดของส่วนราชการในสำนักนายกรัฐมนตรียกเว้น ข้าราชการของส่วนราชการซึ่งหัวหน้าส่วนราชการขึ้นตรงต่อนายกรัฐมนตรี มาตรา 16 สำนักนายกรัฐมนต xt": "ใครเป็นผู้รักษาการตามพระราชบัญญัติระเบียบริหารราชการแผ่นดิน พ.ศ. 2534 และแก้ไข เพิ่มเติม", "choices": {"ก": "นายกรัฐมนตรี", "ข": "รัฐมนตรีว่าการกระทรวงมหาดไทย", "ค": "รัฐมนตรีว่าการกระทรวงการคลัง", "ง": "รัฐมนตรีว่าการกระทรวงศึกษาธิการ"}, "answer": "ก", "explanation": "นายกรัฐมนตรี มาตรา 6 ให้นายกรัฐมนตรีรักษาการตามพระราชบัญญัตินี้"}, {"num": 42, "text": "สำนักนายกรัฐมนตรีมีฐานะเป็นอะไร", "choices": {"ก": "กระทรวง", "ข": "ทบวง", "ค": "กรม", "ง": "ส่วนราชการ"}, "answer": "ก", "explanation": "กระทรวง มาตรา 7 สำนักนายกรัฐมนตรีมีฐานะเป็นกระทรวง"}, {"num": 43, "text": "การรวม หรือการโอน ถ้าไม่มีการกำหนดตำแหน่งหรืออัตราข้ าราชการหรือลูกจ้างเพิ่มขึ้น ให้ สำนักงาน ก.พ. และสำนักงบประมาณตรวจสอบมิให้มีการกำหนดตำแหน่งข้าราชการหรือลูกจ้าง เพิ่มขึ้นจนกว่าจะครบกี่ปี", "choices": {"ก": "2 ปี", "ข": "3 ปี", "ค": "4 ปี", "ง": "5 ปี"}, "answer": "ข", "explanation": "3 ปี มาตรา 8 ทวิ 4 การรวมหรือการโอนส่วนราชการตามมาตรา ๗ ไม่ว่าจะมีผลเป็นการ จัด ตั้งส่วนราชการขึ้นใหม่หรือไม่ ถ้าไม่มีการกำหนดตำแหน่งหรืออัต ราของข้าราชการหรือ ลูกจ้างเพิ่มขึ้นให้ตราเป็นพระราชกฤษฎีกาพระราชกฤษฎีกาตามวรรคหนึ่ง ให้ระบุอำนาจ หน้าที่ของส่วนราชการ การโอนอำนาจหน้าที่ตามบทบัญญัติแห่งกฎหมาย "}, {"num": 44, "text": "ส่วนราชการ รัฐวิสาหกิจ จะรับโอนข้าราชการหรือลูกจ้าง ต้องทำภายในกี่วัน", "choices": {"ก": "10 วัน", "ข": "15 วัน", "ค": "20 วัน", "ง": "30 วัน"}, "answer": "ง", "explanation": "30 วัน มาตรา 8 จัตวา 6 วรรคสาม การยุบส่วนราชการตามมาตรา ๗ ให้ตราเป็นพระราช กฤษฎีกา ในกรณีท ี่ ส่ วนราชการ รัฐวิสาหกิจ หรื อ หน่ว ยงานอื ่น ของรั ฐ ประสงค์จ ะรั บ โอน ข้าราชการหรือลูกจ้างตามวรรคสามก็ให้กระทำได้โดยมิให้ถือว่าข้าราชการหรือลู กจ้างผู้นั้นได้ พ้นจากราชการตามวรรคสาม แต่ทั้งนี้ต้องกระทำภาย"}, {"num": 45, "text": "เมื่อศาลรัฐธรรมนูญวินิจฉัยว่าความเป็นรัฐมนตรีของนายกรัฐมนตรีสิ้นสุดลง ข้อใดกล่าวถูกต้อง", "choices": {"ก": "ให้คณะรัฐมนตรี มอบหมายให้ รองนายกรัฐมนตรี ปฏิบัติหน้าที่แทน", "ข": "ให้คณะรัฐมนตรี มอบหมายให้ รัฐมนตรี รักษาราชการแทน", "ค": "ให้คณะรัฐมนตรี มอบหมายให้ รองนายกรัฐมนศรี รักษาราชการแทน", "ง": "ให้คณะรัฐมนตรี มอบหมายให้ รัฐมนตรี ปฏิบัติหน้าที่แทน"}, "answer": "ก", "explanation": "ให้คณะรัฐมนตรี มอบหมายให้ รองนายกรัฐมนตรี ปฏิบัติหน้าที่แทน มาตรา 10 วรรคสาม สำนักนายกรัฐมนตรีมีอำนาจหน้าที่ตามที่กำหนดไว้ในกฎหมายว่า ด้วยการปรับปรุงกระทรวง ทบวง กรม ในระหว่างที่คณะรัฐมนตรีต้องอยู่ในตำแหน่งเพื่อปฏิบัติหน้าที่ต่อไปจนกว่าคณะรัฐมนตรี ที่ตั้งขึ้นใหม่จะเข้ารับหน้าที่เพราะนายกรัฐมนตรีตาย "}, {"num": 46, "text": "การรักษาราชการแทน ห้ามมิให้บังคับกับหน่วยงานใด", "choices": {"ก": "กระทรวงการคลัง", "ข": "กระทรวงที่เกี่ยวกับการทหาร", "ค": "มหาวิทยาลัย", "ง": "ถูกทุกข้อ"}, "answer": "ข", "explanation": "กระทรวงที่เกี่ยวกับการทหาร มาตรา 50 ความในหมวดนี้มิให้ใช้บังคับแก่ราชการในกระทรวงที่เกี่ยวกับทหาร"}, {"num": 47, "text": "ก่อนที่คณะรัฐมนตรีจะให้ความเห็นชอบในร่างพระราชกฤษฎีกาจัดตั้งส่วนราชการของกระทรวง ใดให้นายกรัฐมนตรีส่งร่างพระราชกฤษฎีกาดังกล่าวต่อใครเพื่อทราบ", "choices": {"ก": "สภาผู้แทนราษฎรและวุฒิสภา", "ข": "ปลัดกระทรวง", "ค": "รัฐมนตรีเจ้าสังกัด", "ง": "นายกรัฐมนตรี"}, "answer": "ก", "explanation": "สภาผู้แทนราษฎรและวุฒิสภา มาตรา 18 ให้จัดระเบียบราชการของกระทรวง วรรคหก ก่อนที่คณะรัฐมนตรีจะให้ความเห็นชอบในร่างพระราชกฤษฎีกาจัดตั้ง ส่ว นราซการ ตามวรรคสี ่ ของกระทรวงใด ให้ น ายกรั ฐ มนตรีส ่ ง ร่า งพระราชกฤษฎีก าดั ง กล่า วต่ อสภา ผู้แทนราษฎรและวุฒิสภาเพื่อทราบ20ให้นำความในวรรคสี่ วรรคห้า วรรคหก แล"}, {"num": 48, "text": "ให้ส่วนราชการระดับกรมตั้งแต่ 2 ส่วนราชการอยู่ภายใต้กลุ่มภารกิจเดียวกันออกเป็นกฎหมายใด", "choices": {"ก": "พระราชบัญญัติประกอบรัฐธรรมนูญ", "ข": "พระราชกฤษฎีกา", "ค": "พระราชบัญญัติ", "ง": "กฎกระทรวง"}, "answer": "ง", "explanation": "กฎกระทรวง มาตรา 21 25... ภายในกระทรวงจะออกกฎกระทรวงกำหนดให้ส่วนราชการระดับกรมตั้งแต่สองส่วน ราชการขึ้นไปอยู่ภายใต้กลุ่มภารกิจเดียวกันก็ได้ โดยให้แต่ละกลุ่มภารกิจมีผู้ด ำรงตำแหน่ง ไม่ ต่ำกว่าอธิบดีคนหนึ่งเป็นหัวหน้ากลุ่มภารกิจรับผิดชอบราชการและบังคับบัญชาข้าราชการของ ส่วนราชการในกลุ่มภารกิจนั้น โดยปฏ"}, {"num": 49, "text": "คณะกรรมการพัฒนาระบบราชการ มีชื่อย่อว่าอะไร", "choices": {"ก": "ก.พ.", "ข": "ก.พ.ร.", "ค": "ก.พ.ร", "ง": "กพร."}, "answer": "ข", "explanation": "ก.พ.ร. มาตรา 71/1 56 ให้มีคณะกรรมการพัฒนาระบบราชการคณะหนึ่ ง เรียกโดยย่อ ว่ า “ก.พ.ร.”"}, {"num": 50, "text": "สำนักงานคณะกรรมการพัฒนาระบบราชการเป็นส่วนราชการในหน่วยงานใด", "choices": {"ก": "สำนักนายกรัฐมนดรี", "ข": "สำนักงานปลัดกระทรวงมหาดไทย", "ค": "สำนักงานรัฐมนตรี", "ง": "สำนักงานปลัดสำนักนายกรัฐมนตรี"}, "answer": "ก", "explanation": "สำนักนายกรัฐมนดรี มาตรา 71/5 65 ให้มีสำนักงานคณะกรรมการพัฒนาระบบราชการ เป็นส่วนราชการใน สำนักนายกรัฐมนตรี ทำหน้าที่รับผิดชอบงานธุรการของ ก.พ.ร. และหน้าที่อื่นตามที่ กฎหมาย หรือ ก.พ.ร. กำหนด พระราชบัญญัติการปฏิบัติราชการทางอิเล็กทรอนิกส์ พ.ศ. 2565                      91 พระราชบัญญัติการปฏิบัติราชการ"}]}, {"name": "พ.ร.บ.การปฏิบัติราชการทางอิเล็กทรอนิกส์ พ.ศ. 2565", "questions": [{"num": 1, "text": "พระราชบัญญัติการปฏิบัติราชการทางอิเล็กทรอนิกส์ พ.ศ. 2565 ให้ใช้บังคับตั้งแต่เมื่อใด", "choices": {"ก": "วันประกาศในราชกิจจานุเบกษาเป็นต้นไป", "ข": "วันถัดจากวันประกาศในราชกิจจานุเบกษาเป็นต้นไป", "ค": "เมื่อพ้นกำหนดเก้าสิบวันนับแต่วันประกาศในราชกิจจานุเบกษาเป็นต้นไป", "ง": "เมื่อพ้นกำหนดหนึ่งร้อยยี่สิบวันนับแต่วันประกาศในราชกิจจานุเบกษาเป็นต้นไป"}, "answer": "ค", "explanation": "เมื่อพ้นกำหนดเก้าสิบวันนับแต่วันประกาศในราชกิจจานุเบกษาเป็นต้นไป มาตรา 2 พระราชบัญญัตินี้ให้ใช้บังคับเมื่อพ้นกำหนดเก้าสิบวันนับแต่วันประกาศใน ราชกิจจานุเบกษาเป็นต้นไป เว้นแต่มาตรา 12 มาตรา 15 วรรคสอง มาตรา 19 และมาตรา"}, {"num": 2, "text": "ข้อใด มิใช่ ความหมายของ “หน่วยงานของรัฐ” ในพระราชบัญญัตินี้", "choices": {"ก": "ราชการส่วนกลาง", "ข": "ราชการส่วนท้องถิ่น", "ค": "รัฐวิสาหกิจ", "ง": "รัฐวิสาหกิจที่เป็นบริษัทจำกัดหรือบริษัทมหาชนจำกัด"}, "answer": "ง", "explanation": "รัฐวิสาหกิจที่เป็นบริษัทจำกัดหรือบริษัทมหาชน “หน่วยงานของรัฐ” หมายความว่า ราชการส่วนกลาง ราชการส่วนภูมิภาค ราชการ ส่วนท้องถิ่น รัฐวิสาหกิจ องค์การมหาชน และหน่วยงานอื่นของรัฐทุกหน่วย แต่ไม่รวมถึง รัฐวิสาหกิจที่เป็นบริษัทจำกัดหรือบริษัทมหาชนจำกัด"}, {"num": 3, "text": "เพื่อประโยชน์ในการดำเนินการตามพระราชบัญญัตินี้ให้มีประสิทธิภาพ ให้ผู้ใดกำหนดวิธีก ารทาง อิเล็กทรอนิกส์ซึ่งรวมถึงมาตรฐานข้อมูลด้านเทคโนโลยีสารสนเทศและการสื่อ สาร ที่หน่วยงานของรัฐ จะต้องใช้และปฏิบัติให้สอดคล้องกัน เชื่อมโยงถึงกันได้มีความมั่นคงปลอดภัย และประชาชนทั่วไป สามารถเข้าถึงได้โดยสะดวก", "choices": {"ก": "นายกรัฐมนตรี", "ข": "คณะรัฐมนตรี", "ค": "ปลัดกระทรวงมหาดไทย", "ง": "รัฐมนตรีว่าการกระทรวงมหาดไทย"}, "answer": "ข", "explanation": "คณะรัฐมนตรี มาตรา 6 เพื่อประโยชน์ในการดำเนินการตามพระราชบัญญัตินี้ให้มีประสิทธิภ าพให้ คณะรัฐมนตรีกำหนดวิธ ีก ารทางอิเ ล็ กทรอนิ กส์ ซึ่ ง รวมถึง มาตรฐานข้ อมูลด้ านเทคโนโลยี สารสนเทศและการสื่อสาร ที่หน่วยงานของรัฐจะต้องใช้และปฏิบัติให้สอดคล้องกัน เชื่อมโยง ถึงกันได้มีความมั่นคงปลอดภัย และประชาชนทั่"}, {"num": 4, "text": "ในกรณีที่ผู้อนุญาตประสงค์จะตรวจสอบความถูกต้องแท้จริงของบัตรประจำตัวประชาชนที่ผู้ขอ อนุญาตยื ่ นหรือแสดงต่อผู้อ นุ ญาต ให้เป็นหน้ าที่ข องผู้ อ นุ ญ าตที ่จ ะติ ดต่อกับหน่ว ยงานใดเพื่ อ ดำเนินการตรวจสอบ", "choices": {"ก": "สำนักทะเบียนกลางตามกฎหมายว่าด้วยการทะเบียนราษฎร", "ข": "หน่วยงานของรัฐ", "ค": "สำนักนายกรัฐมนตรี", "ง": "สำนักงานทะเบียน"}, "answer": "ก", "explanation": "สำนักทะเบียนกลางตามกฎหมายว่าด้วยการทะเบียนราษฎร มาตรา 9 ในกรณีที่ผู้อนุญาตประสงค์จ ะตรวจสอบความถูกต้องแท้จ ริงของบัตร ประจำตัวประชาชนที่ผู้ขออนุญาตยื่นหรือแสดงต่อผู้อนุญาต ให้เป็นหน้าที่ข องผู้ อ นุญ าตที่จ ะ ติดต่อกับสำนักทะเบียนกลางตามกฎหมายว่าด้วยการทะเบียนราษฎรเพื่อดำเนินการตรวจสอบ และให้เป็นหน้"}, {"num": 5, "text": "ในกรณีที่ผู้ขออนุญาตได้ดำเนินการอย่างไร การติดต่อหรือออกเอกสารหลักฐานใด ๆ ที่เกี่ยวข้องกับ ผู้นั้น ให้ทำโดยวิธีการทางอิเล็กทรอนิกส์", "choices": {"ก": "ได้ยื่นคำขออนุญาตโดยใช้วิธีการทางอิเล็กทรอนิกส์แล้ว", "ข": "ติดต่อกับผู้อนุญาตโดยใช้วิธีการทางอิเล็กทรอนิกส์แล้ว", "ค": "ติดต่อกับหน่วยงานของรัฐโดยใช้วิธีการทางอิเล็กทรอนิกส์แล้ว", "ง": "ถูกทุกข้อ"}, "answer": "ง", "explanation": "ถูกทุกข้อ มาตรา 11 ในกรณีที่ผู้ขออนุญาตได้ยื่นคำขออนุญาตหรือติดต่อกับผู้อนุญาตหรือ หน่วยงานของรัฐโดยใช้วิธีการทางอิเล็กทรอนิกส์แล้ว การติดต่อหรือออกเอกสารหลักฐานใด ๆ ที่เกี่ยวข้องกับผู้นั้น ให้ทำโดยวิธีการทางอิเล็กทรอนิกส์ เว้นแต่ผู้นั้นจะได้ระบุไว้เป็นประการอื่น ในการยื่นคำขออนุญาตหรือในการติดต่อ"}, {"num": 6, "text": "ในการติดต่อหรือส่งเรื่องถึงกันรูปแบบใด ถ้าได้ก ระทำโดยวิธีการทางอิเล็กทรอนิกส์แล้วให้ถือว่า เป็นการชอบด้วยกฎหมายและใช้เป็นหลักฐานได้ตามกฎหมาย", "choices": {"ก": "ระหว่างหน่วยงานของรัฐด้วยกัน", "ข": "ระหว่างเจ้าหน้าที่ของรัฐกับหน่วยงานของรัฐ", "ค": "ระหว่างประชาชนกับหน่วยงานของรัฐ", "ง": "ถูกทุกข้อ"}, "answer": "ง", "explanation": "ถูกทุกข้อ มาตรา 15 ในการติดต่อหรือส่ง เรื่อ งถึ งกันในระหว่ างหน่วยงานของรัฐด้ ว ยกั น ระหว่างเจ้าหน้าที่ของรัฐกับหน่วยงานของรัฐ หรือระหว่างประชาชนกับหน่วยงานของรัฐ หรือ เฉลยแนวข้อสอบพระราชบัญญัติการปฏิบัติราชการทางอิเล็กทรอนิกส์ พ.ศ. 2565                          101 เจ้าหน้าที่ของรัฐในส่วนที่เกี่ย"}, {"num": 7, "text": "บรรดาข้อมูลข่าวสารที่หน่วยงานของรัฐต้องจัดเก็บตามกฎหมายว่าด้วยข้อมูลข่าวสารของราชการ ถ้าข้อมูลข่าวสารหรือเอกสารนั้นมิได้อยู่ในรูปแบบอิเล็กทรอนิก ส์ คณะรัฐมนตรีจ ะมีมติ ให้ห น่ ว ยงาน ของรัฐจัดเก็บในรูปแบบอิเล็กทรอนิกส์แทนการจัดเก็บเป็นเอกสาร และส่งมอบเอกสารต้นฉบับ ให้ หน่วยงานใด", "choices": {"ก": "คณะรัฐมนตรี", "ข": "กรมศิลปากร", "ค": "หน่วยงานรัฐ", "ง": "สำนักเลขาธิการคณะรัฐมนตรี"}, "answer": "ข", "explanation": "กรมศิลปากร มาตรา 17 บรรดาข้อมูลข่าวสารที่หน่วยงานของรัฐต้องจัดเก็บตามกฎหมายว่ าด้วย ข้อมูลข่าวสารของราชการ หรือเอกสารอื่นใดที่อยู่ในความครอบครองของหน่วยงานของรัฐ และต้องจัดเก็บตามกฎหมาย กฎ ระเบียบ ข้อบังคับ หรือมติของคณะรัฐมนตรี ถ้าข้อมูล ข่าวสารหรือเอกสารนั้นมิได้อยู่ในรูปแบบอิ เล็กทรอนิกส์ คณะรัฐม"}, {"num": 8, "text": "การจัดทำและเผยแพร่ราชกิจจานุเบกษาให้กระทำโดยวิธีการทางอิเล็กทรอนิกส์แทนการจั ดพิมพ์ เพื่อให้ประชาชนสามารถเข้าถึงได้โดยสะดวก รวดเร็ว และสามารถจัดทำสำเนาได้โดยตนเอง และใน กรณีที่ประชาชนประสงค์จะได้สำเนาเรื่องใดเรื่องหนึ่ง ให้เป็นหน้าที่ของหน่วยงานใดที่จ ะต้อ งจั ด ให้ โดยเร็ว", "choices": {"ก": "คณะรัฐมนตรี", "ข": "กรมศิลปากร", "ค": "หน่วยงานรัฐ", "ง": "สำนักเลขาธิการคณะรัฐมนตรี"}, "answer": "ง", "explanation": "สำนักเลขาธิการคณะรัฐมนตรี มาตรา 18 การจัด ทำและเผยแพร่ ร าชกิจ จานุ เ บกษาให้ ก ระทำโดยวิธ ีก ารทาง อิเล็กทรอนิกส์แทนการจัดพิมพ์เพื่อให้ประชาชนสามารถเข้าถึงได้โดยสะดวก รวดเร็ว และ สามารถจัดทำสำเนาได้โดยตนเอง และในกรณีที่ประชาชนประสงค์จ ะได้สำเนาเรื่องใดเรื่อง หนึ่ง ให้เป็นหน้าที่ของสำนักเลขาธิการคณะ"}, {"num": 9, "text": "หน่วยงานใดจัดทำวิธีการทางอิเล็กทรอนิกส์ตามมาตรา 6 เสนอต่อคณะรัฐมนตรีเพื่อกำหนดให้ หน่วยงานของรัฐใช้และปฏิบัติ", "choices": {"ก": "สำนักงานคณะกรรมการพัฒนาระบบราชการ", "ข": "สำนักงานคณะกรรมการกฤษฎีกา", "ค": "สำนักงานพัฒนาธุรกรรมทางอิเล็กทรอนิกส์ และสำนักงานพัฒนารัฐบาลดิจ ิทัล (องค์การ", "ง": "ถูกทุกข้อ"}, "answer": "ง", "explanation": "ถูกทุกข้อ มาตรา 19 ให้ ส ำนั ก งานคณะกรรมการพั ฒ นาระบบราชการ สำนั ก งาน คณะกรรมการกฤษฎีกา สำนักงานพัฒนาธุรกรรมทางอิเล็กทรอนิกส์ และสำนักงานพัฒนา รัฐบาลดิจิทัล (องค์การมหาชน) ร่วมกันจัดทำวิธีการทางอิเล็กทรอนิกส์ตามมาตรา 6 เสนอต่อ คณะรั ฐ มนตรี เ พื ่ อ กำหนดให้ ห น่ ว ยงานของรั ฐ ใช้แ ละปฏิบ ั ติ โด"}, {"num": 10, "text": "ผู้ใดรักษาการตามพระราชบัญญัตินี้", "choices": {"ก": "นายกรัฐมนตรี", "ข": "ปลัดกระทรวงมหาดไทย", "ค": "รัฐมนตรีว่าการกระทรวงการคลัง", "ง": "ปลัดกระทรวงการคลัง"}, "answer": "ก", "explanation": "นายกรัฐมนตรี มาตรา 24 ให้นายกรัฐมนตรีรักษาการตามพระราชบัญญัตินี้ และให้มีอ ำนาจออก กฎกระทรวงเพื่อปฏิบัติการตามพระราชบัญญัตินี้ กุล เท่ดัานัดแปลง ้น พิมพ์จำหน่ จาก IPายAddress แจกจ่า: ย110.164.194.141 โดยไม่ได้รับอนุญาต 102 พระราชบัญญัติวิธีการงบประมาณ พ.ศ. 2561 สมเด็จพระเจ้าอยู่หัวมหาวชิราลงกรณ บดิน"}]}, {"name": "พ.ร.บ.วิธีการงบประมาณ พ.ศ. 2561", "questions": [{"num": 1, "text": "พระราชบัญญัติวิธีงบประมาณ พ.ศ.2561 ให้ใช้บังคับเมื่อใด", "choices": {"ก": "วันประกาศในราชกิจจานุเบกษาเป็นต้นไป", "ข": "วันถัดจากวันประกาศในราชกิจจานุเบกษาเป็นต้นไป", "ค": "เมื่อพ้นกำหนด 90 วันนับจากวันประกาศในราชกิจจานุเบกษาเป็นต้นไป", "ง": "เมื่อพ้นกำหนด 120 วันนับจากวันประกาศในราชกิจจานุเบกษาเป็นต้นไป"}, "answer": "ข", "explanation": "วันถัดจากวันประกาศในราชกิจจานุเบกษาเป็นต้นไป มาตรา 2 พระราชบัญญัตินี้ให้ใช้บังคับตั้งแต่วันถัดจากวันประกาศในราชกิจ จานุเบกษา เป็นต้นไป"}, {"num": 2, "text": "ข้อใดเป็นความหมายของ “หน่วยงานของรัฐ” ตามพระราชบัญญัตินี้", "choices": {"ก": "องค์กรมหาชน", "ข": "ทุนหมุนเวียนที่มีฐานะเป็นนิติบุคคล", "ค": "องค์กรปกครองส่วนท้องถิ่น", "ง": "ถูกทุกข้อ"}, "answer": "ง", "explanation": "ถูกทุกข้อ มาตรา 4 ในพระราชบัญญัตินี้ “หน่วยงานของรัฐ” หมายความว่า (1) ส่วนราชการ (2) รัฐวิสาหกิจ (3) หน่วยงานของรัฐสภา ศาลยุต ิธรรม ศาลปกครอง ศาลรัฐธรรมนูญ องค์กรอิสระ ตามรัฐธรรมนูญ และองค์กรอัยการ (4) องค์การมหาชน (5) ทุนหมุนเวียนที่มีฐานะเป็นนิติบุคคล (6) องค์กรปกครองส่วนท้องถิ่น (7) หน่วยงานอื่นข"}, {"num": 3, "text": "ใครเป็นผู้รักษาการตามพระราชบัญญัตินี้", "choices": {"ก": "นายกรัฐมนตรี", "ข": "รัฐมนตรีว่าการกระทรวงการคลัง", "ค": "ปลัดกระทรวงการคลัง", "ง": "ถูกทั้งข้อ ก และ ข"}, "answer": "ง", "explanation": "ถูกทั้งข้อ ก และ ข มาตรา 5 ให้ น ายกรั ฐ มนตรี แ ละรั ฐ มนตรี ว ่ า การกระทรวงการคลั ง รั ก ษาการตาม พระราชบัญญัตินี้ และให้มีอำนาจออกระเบียบเพื่อปฏิบัติการให้เป็นไปตามพระราชบัญญัตินี้"}, {"num": 4, "text": "งบประมาณประจำปีที่เสนอต่อรัฐสภา อย่างน้อยต้องมีเอกสารประกอบตามข้อใด", "choices": {"ก": "รายรับรายจ่ายเปรียบเทียบระหว่างปีที่ล่วงมาแล้ว ปีปัจจุบัน และปีที่ขอตั้งงบประมาณ", "ข": "คำอธิบายเกี่ยวกับประมาณการรายรับ", "ค": "รายงานเกี่ยวกับสถานะทางการเงินโดยรวมของรัฐวิสาหกิจ", "ง": "ถูกทุกข้อ"}, "answer": "ง", "explanation": "ถูกทุกข้อ มาตรา 10 งบประมาณประจำปีที่เสนอต่อรัฐสภา อย่างน้อยต้องมีเอกสารประกอบ ดังต่อไปนี้ (1) คำแถลงประกอบงบประมาณแสดงฐานะและนโยบายการคลั ง และการเงิน สาระสำคัญของงบประมาณ และความสัมพันธ์ระหว่างรายรับและงบประมาณรายจ่ายที่ขอตั้ง (2) รายรับรายจ่ายเปรีย บเทียบระหว่ างปี ที่ล ่วงมาแล้ว ปีปัจ จุบัน และป"}, {"num": 5, "text": "ข้อใดกล่าวไม่ถูกต้อง", "choices": {"ก": "ในการเสนองบประมาณต่อรัฐสภานั้น ถ้าประมาณการรายรับประเภทรายได้ตามที่มีกฎหมาย", "ข": "ในกรณีที่พระราชบัญญัติงบประมาณรายจ่ายประจำปีออกใช้ไม่ทันปีงบประมาณใหม่ให้ชะลอ", "ค": "การเสนองบประมาณรายจ่ายเพิ่มเติมต่อรัฐสภา ให้คณะรัฐมนตรีเสนอร่างพระราชบัญญัติ", "ง": "วิธีการจัดทำงบประมาณรายจ่ายเพิ่มเติมให้เป็นไปตามที่ผู้อำนวยการกำหนด"}, "answer": "ข", "explanation": "ในกรณีที่พระราชบัญญัติงบประมาณรายจ่ายประจำปีออกใช้ไม่ทันปีง บประมาณ ใหม่ให้ชะลอการดำเนินงานจนกว่าจะมีการประกาศใช้ มาตรา 12 ในกรณี ท ี ่ พ ระราชบั ญ ญั ต ิ ง บประมาณรายจ่ า ยประจำปี อ อกใช้ ไ ม่ ทั น ปีงบประมาณใหม่ ให้ใช้งบประมาณรายจ่ายประจำปีงบประมาณที่ล่วงแล้วไปพลางก่อนได้ ทั้งนี้ ตามหลักเกณฑ์และเง"}, {"num": 6, "text": "ให้ผู้อำนวยการเสนองบประมาณประจำปีต่อใคร", "choices": {"ก": "นายกรัฐมนตรี", "ข": "รัฐมนตรีว่าการกระทรวงการคลัง", "ค": "ปลัดกระทรวงการคลัง", "ง": "คณะรัฐมนตรี"}, "answer": "ก", "explanation": "นายกรัฐมนตรี มาตรา 20 ให้ ผ ู ้ อ ำนวยการเสนองบประมาณประจำปี ต ่ อ นายกรั ฐ มนตรี เพื่ อ คณะรัฐมนตรี เสนอต่อรัฐสภาเป็นเวลาอย่างน้อยสามเดือนก่อนวันเริ่มปีงบประมาณนั้น"}, {"num": 7, "text": "ให้ผู้อำนวยการเสนองบประมาณประจำปีเพื่อคณะรัฐมนตรีเสนอต่อรัฐสภาเป็นเวลาอย่างน้อยกี่ เดือน", "choices": {"ก": "1 เดือนก่อนวันเริ่มปีงบประมาณนั้น", "ข": "2 เดือนก่อนวันเริ่มปีงบประมาณนั้น", "ค": "3 เดือนก่อนวันเริ่มปีงบประมาณนั้น", "ง": "4 เดือนก่อนวันเริ่มปีงบประมาณนั้น"}, "answer": "ค", "explanation": "3 เดือนก่อนวันเริ่มปีงบประมาณนั้น มาตรา 20 ให้ผู้อำนวยการเสนองบประมาณประจำปีต่อนายกรัฐมนตรี เพื่อคณะรัฐมนตรี เสนอต่อรัฐสภาเป็นเวลาอย่างน้อยสามเดือนก่อนวันเริ่มปีงบประมาณนั้น"}, {"num": 8, "text": "การจัดทำงบประมาณต้องคำนึงถึงข้อใด", "choices": {"ก": "ประมาณการรายรับ", "ข": "ฐานะทางการคลังของประเทศ", "ค": "ความจำเป็นในการพัฒนาประเทศตามยุทธศาสตร์ชาติ", "ง": "ถูกทุกข้อ"}, "answer": "ง", "explanation": "ถูกทุกข้อ มาตรา 23 การจัดทำงบประมาณต้องคำนึงถึงประมาณการรายรับและฐานะทางการคลั ง ของ ประเทศ ความจำเป็นในการพัฒนาประเทศตามยุทธศาสตร์ชาติแผนพัฒนาเศรษฐกิจ และ สังคมแห่งชาติ เสถียรภาพทางเศรษฐกิจภายในและภายนอกประเทศ ความเป็นธรรมทางสังคม นโยบายรัฐบาล และ ภารกิจของหน่วยรับงบประมาณ เพื่อให้เกิดประสิทธิภาพแล"}, {"num": 9, "text": "ในการจัดทำงบประมาณประจำปี ให้สำนักงบประมาณเป็นหน่วยงานหลักโดยร่วมกับหน่วยงานใด", "choices": {"ก": "กระทรวงการคลัง", "ข": "สำนักงานคณะกรรมการพัฒนาการเศรษฐกิจและสังคมแห่งชาติ", "ค": "ธนาคารแห่งประเทศไทย", "ง": "ถูกทุกข้อ"}, "answer": "ง", "explanation": "ถูกทุกข้อ มาตรา 24 ในการจัดทำงบประมาณประจำปี ให้สำนักงบประมาณเป็นหน่วยงานหลัก โดย ร ": "ผู้อำนวยการสำนักงบประมาณ มาตรา 36 งบประมาณรายจ่ายของหน่วยรับงบประมาณที่กำหนดไว้ในแผนงานหรือ รายการใด ตามกฎหมายว่าด้วยงบประมาณรายจ่าย หรือพระราชกฤษฎีกาตามมาตรา 35(2) จะโอนหรือนำไปใช้ ในแผนงานหรือรายการอื่นมิได้ เว้นแต่จะได้รับอนุมัติจากผู้อำนวยการ แต่ ผู้อำนวยการจะอนุมัติมิได้ ในกรณีที่เป็นผลให้เพิ่ม"}, {"num": 13, "text": "รายจ่ายรายการต่างๆที่กำหนดไว้ในงบประมาณรายจ่ายงบกลาง ใครมีอำนาจจัดสรรให้หน่วยรับ งบประมาณเบิกจ่ายโดยตรง", "choices": {"ก": "นายกรัฐมนตรี", "ข": "รัฐมนตรีว่าการกระทรวงการคลัง", "ค": "ผู้อำนวยการสำนักงบประมาณ", "ง": "คณะรัฐมนตรี"}, "answer": "ค", "explanation": "ผู้อำนวยการสำนักงบประมาณ มาตรา 36... รายจ่ายรายการต่างๆ ที่กำหนดไว้ในงบประมาณรายจ่ายงบกลาง ให้ผู้อำนวยการมี อำนาจจัดสรร ให้หน่วยรับงบประมาณเบิกจ่ายโดยตรง หรือเบิกจ่ายในรายการต่าง ๆ ของ หน่วยรับงบประมาณนั้น ๆ ได้ตามความจำเป็น"}, {"num": 14, "text": "เพื่อประโยชน์ในการควบคุมงบประมาณรายจ่าย ใครมีอำนาจเรียกให้หน่วยรับงบประมาณเสนอ ข้อเท็จจริงตามที่เห็นสมควร", "choices": {"ก": "นายกรัฐมนตรี", "ข": "รัฐมนตรีว่าการกระทรวงการคลัง", "ค": "ผู้อำนวยการสำนักงบประมาณ", "ง": "รัฐมนตรีว่าการกระทรวงมหาดไทย"}, "answer": "ข", "explanation": "รัฐมนตรีว่าการกระทรวงการคลัง มาตรา 37 ให้รัฐมนตรีเป็นผู้รับผิด ชอบควบคุมการเบิกจ่ายเงินงบประมาณรายจ่าย ของหน่วยรับ งบประมาณให้เป็นไปตามพระราชบัญญัตินี้ และกฎหมายว่าด้วยงบประมาณ รายจ่าย และเพื่อการนี้ ให้รัฐมนตรีโดยความเห็นชอบของคณะรัฐมนตรีมีอำนาจออกระเบียบ กำหนดหลักเกณฑ์ วิธีการ และเงื่อนไขเกี่ยวกับ"}, {"num": 15, "text": "รายการงบประมาณรายจ่ายที่จะต้องก่อหนี้ผูกพันข้ามปีงบประมาณ ให้ผู้อำนวยการรวบรวม รายการงบประมาณรายจ่ายที่จะต้องก่อหนี้ผูกพันและวงเงินที่คาดว่าจะต้องก่อหนี้ผูกพันงบประมาณ รายจ่ายในปีต่อๆไป รวมทั้งจำนวนเงินเผื่อเหลือเผื่อขาดเสนอให้คณะรัฐมนตรีพิจารณาอนุมัติการก่ อ หนี้ผูกพันภายในกี่วัน", "choices": {"ก": "30 วันนับแต่วันที่กฎหมายว่าด้วยงบประมาณรายจ่ายมีผลใช้บังคับ", "ข": "45 วันนับแต่วันที่กฎหมายว่าด้วยงบประมาณรายจ่ายมีผลใช้บังคับ", "ค": "60 วันนับแต่วันที่กฎหมายว่าด้วยงบประมาณรายจ่ายมีผลใช้บังคับ", "ง": "90 วันนับแต่วันที่กฎหมายว่าด้วยงบประมาณรายจ่ายมีผล  19, "text": "ให้หน่วยรับงบประมาณรายงานผลการใช้จ่ายงบประมาณรายจ่ายในปีงบประมาณที่สิ้นสุดรวมทั้ง ผลการปฏิบัติงานให้ผู้อำนวยการทราบภายในกี่วัน", "choices": {"ก": "30 วันนับแต่วันสิ้นปีงบประมาณ", "ข": "45 วันนับแต่วันสิ้นปีงบประมาณ", "ค": "60 วันนับแต่วันสิ้นปีงบประมาณ", "ง": "90 วันนับแต่วันสิ้นปีงบประมาณ"}, "answer": "ข", "explanation": "45 วันนับแต่วันสิ้นปีงบประมาณ มาตรา 50 ให้หน่วยรับงบประมาณรายงานผลการใช้จ ่า ยงบประมาณรายจ่ า ยใน ปีงบประมาณ ที่สิ้นสุดรวมทั้งผลการปฏิบัติงานให้ผู้อำนวยการทราบภายในสี่สิ บห้ า วันนับ แต่ วันสิ้นปีงบประมาณ เพื่อผู้อำนวยการจัด ทำรายงานผลการใช้จ่ายงบประมาณรายจ่า ยและผล การปฏิบัติงานของหน่วยรับงบประมาณ "}, {"num": 20, "text": "ให้ผู้อำนวยการรายงานการโอนงบประมาณรายจ่ายงบกลางระหว่างรายการ ที่กำหนดไว้ใน งบประมาณรายจ่ายงบกลาง หรือการโอนงบประมาณรายจ่ายบูรณาการและงบประมาณรายจ่าย บุคลากรระหว่างหน่วยรับงบประมาณเสนอต่อคณะรัฐมนตรีเพื่อรายงานต่อรัฐสภาภายในกี่วัน", "choices": {"ก": "30 วันนับแต่วันสิ้นปีงบประมาณนั้น", "ข": "45 วันนับแต่วันสิ้นปีงบประมาณนั้น", "ค": "60 วันนับแต่วันสิ้นปีงบประมาณนั้น", "ง": "90 วันนับแต่วันสิ้นปีงบประมาณนั้น"}, "answer": "ก", "explanation": "30 วันนับแต่วันสิ้นปีงบประมาณนั้น มาตรา 51 ให้ผู้อำนวยการรายงานการโอนงบประมาณรายจ่ายงบกลางระหว่างรายการ ที่กำหนดไว้ในงบประมาณรายจ่ายงบกลาง หรือการโอนงบประมาณรายจ่ายบูรณาการและ งบประมาณรายจ่ายบุคลากรระหว่างหน่วยรับงบประมาณเสนอต่อคณะรัฐมนตรีเพื่ อ รายงาน ต่อรัฐสภาภายในสามสิบวันนับแต่วันสิ้นปีงบประมาณน"}]}, {"name": "พ.ร.บ.วินัยการเงินการคลังของรัฐ พ.ศ. 2561", "questions": [{"num": 1, "text": "พระราชบัญญัติวินัยการเงินการคลังของรัฐ พ.ศ.2561 ใช้บังคับตั้งแต่เมื่อใด", "choices": {"ก": "วันประกาศในราชกิจจานุเบกษาเป็นต้นไป", "ข": "วันถัดจากวันประกาศในราชกิจจานุเบกษาเป็นต้นไป", "ค": "เมื่อพ้นกำหนด 60 วันนับจากวันประกาศในราชกิจจานุเบกษาเป็นต้นไป", "ง": "เมื่อพ้นกำหนด 90 วันนับจากวันประกาศในราชกิจจานุเบกษาเป็นต้นไป"}, "answer": "ข", "explanation": "วันถัดจากวันประกาศในราชกิจจานุเบกษาเป็นต้นไป มาตรา 2 พระราชบัญญัตินี้ให้ใช้บังคับตั้งแต่วันถัดจากวันประกาศในราชกิจจานุเบกษา เป็นต้นไป"}, {"num": ิจการบ้า นเมือง ที่ดี พ.ศ. 2546", "choices": {"ก": "องค์กรมหาชน", "ข": "องค์กรปกครองส่วนท้องถิ่น", "ค": "กระทรวงมหาดไทย", "ง": "กรมส่งเสริมการปกครองส่วนท้องถิ่น"}, "answer": "", "explanation": ""}, {"num": 2, "text": "พระราชกฤษฎีกาว่าด้วยหลัก เกณฑ์และวิธีการบริหารกิจการบ้านเมืองที่ดี (ฉบับที่ 2) พ.ศ.2562 บังคับใช้ตั้งแต่เมื่อใด", "choices": {"ก": "วันประกาศในราชกิจจานุเบกษาเป็นต้นไป", "ข": "วันถัดจากวันประกาศในราชกิจจานุเบกษาเป็นต้นไป", "ค": "เมื่อพ้นกำหนด 90 วันนับจากวันประกาศในราชกิจจานุเบกษาเป็นต้นไป", "ง": "เมื่อพ้นกำหนด 120 วันนับจากวันประกาศในราชกิจจานุเบกษาเป็นต้นไป"}, "answer": "", "explanation": ""}, {"num": 3, "text": "ให้ส่วนราชการจัดทำแผนปฏิบัติราชการของส่วนราชการนั้นโดยจัดทำเป็นแผนกี่ปี", "choices": {"ก": "4 ปี", "ข": "5 ปี", "ค": "6 ปี", "ง": "10 ปี"}, "answer": "", "explanation": ""}, {"num": 4, "text": "การบริหารราชการเพื่อประโยชน์สุขของประชาชน คือข้อใด", "choices": {"ก": "การปรับปรุงภารกิจของส่วนราชการ", "ข": "ไม่มีขั้นตอนการปฏิบัติงานเกินความจำเป็น", "ค": "การปฏิบัติราชการที่มีเป้าหมายเพื่อให้เกิดความผาสุก และความเป็นอยู่ที่ดีของประชาชน", "ง": "ประชาชนได้รับการอำนวยความสะดวก และได้รับการตอบสนองความต้องการ"}, "answer": "", "explanation": ""}, {"num": 5, "text": "“ข้าราชการ” ตามพระราชกฤษฎีกานี้หมายความรวมถึงใครบ้าง", "choices": {"ก": "ลูกจ้าง", "ข": "ผู้ปฏิบัติงานในส่วนราชการ", "ค": "พนักงาน", "ง": "ถูกทุกข้อ"}, "answer": "", "explanation": ""}, {"num": 6, "text": "หน่วยงานใดที่ร่วมกับสำนักงานคณะกรรมการพัฒนาการเศรษฐกิจ และสังคมแห่งชาติในการ ประเมินความคุ้มค่าการปฏิบัติภารกิจของรัฐ", "choices": {"ก": "สำนักงาน ก.พ.ร.", "ข": "กรมบัญชีกลาง", "ค": "สำนักงาน ก.พ.", "ง": "สำนักงบประมาณ"}, "answer": "", "explanation": ""}, {"num": 7, "text": "เมื่อส่วนราชการได้รับการติดต่อสอบถามเป็นหนังสือจากประชาชนต้องตอบคำถามหรือแจ้งการ ดำเนินการให้ทราบภายในกี่วัน", "choices": {"ก": "15 วัน", "ข": "20 วัน", "ค": "7 วัน", "ง": "10 วัน"}, "answer": "ก", "explanation": "15 วัน มาตรา 38 เมื่อส่วนราชการใดได้รับการติดต่อสอบถามเป็นหนังสือจากประชาชน หรือจาก ส่วนราชการด้วยกันเกี่ยวกับงานที่อยู่ในอำนาจหน้าที่ของส่วนราชการนั้ น ให้เป็นหน้า ที่ข อง ส่วนราชการนั้นที่จ ะต้องตอบคําถามหรือแจ้งการดำเนินการให้ทราบภายในสิบห้าวันหรื อ ภายใน กําหนดเวลาที่กำหนดไว้ตามมาตรา 37"}, {"num": 8, "text": "ส่วนราชการต้องดำเนินการแก้ไขปัญหาและอุปสรรคนั้นโดยเร็วแล้วต้องแจ้งให้ใครทราบ", "choices": {"ก": "ปปช.", "ข": "ก.พ.ร.", "ค": "รมต.", "ง": "ครม."}, "answer": "ข", "explanation": "ก.พ.ร. มาตรา 8 ในการบริหารราชการเพื่อประโยชน์สุขของประชาชน ส่วนราชการ จะต้อง ดำเนินการโดยถือว่าประชาชนเป็นศูนย์กลางที่จะได้รับการบริการจากรัฐ และจะต้องมีแนว ทางการบริหารราชการ ดังต่อไปนี้ (5) ในกรณีที่เกิดปัญหาและอุปสรรคจากการดำเนินการ ให้ส่วนราชการดำเนินการ แก้ไข ปัญหาและอุปสรรคนั้นโดยเร็ว ในกรณีที"}, {"num": 9, "text": "หากผู้บังคับบัญชามีความจำเป็นต้องสั่งราชการด้วยวาจาในฐานะที่เป็นผู้รับคำสั่ง ต้องกระทำการ อย่างไร", "choices": {"ก": "เมื่อปฏิบัติราชการตามคำสั่งนั้นแล้วให้บันทึกรายงานให้ผู้สั่งราชการทราบ", "ข": "บันทึกคำสั่งด้วยวาจาไว้เป็นลายลักษณ์อักษร", "ค": "ปฏิเสธการปฏิบัติตามคำสั่งนั้น", "ง": "ถูกเฉพาะข้อ ก และข้อ ข"}, "answer": "ง", "explanation": "ถูกเฉพาะข้อ ก และข้อ ข มาตรา 26 การสั่งราชการโดยปกติใ ห้ กระทำเป็ นลายลั กษณ์ อั กษร เว้นแต่ในกรณีที่ ผู้บังคับบัญชามีความจําเป็นที่ไม่อาจสั่งเป็นลายลักษณ์อักษรในขณะนั้น จะสั่งราชการด้วย วาจาก็ได้ แต่ให้ผู้รับคำสั่งนั้นบันทึกคำสั่งด้วยวาจาไว้เป็นลายลักษณ์อั กษรและเมื่ อได้ ปฏิ บัติ ราชการตามคำสั่งดั"}, {"num": 10, "text": "ก่อนเริ่มดำเนินการส่วนราชการต้องจัดให้มีก ารศึกษาวิเคราะห์ผลดี และผลเสียให้ครบถ้วนทุก ด้านถือว่าอยู่ในหลักเกณฑ์การของแนวทางใด", "choices": {"ก": "แนวทางการบริหารกิจการบ้านเมืองที่ดี", "ข": "แนวทางการติดตามและประเมินผลการปฏิบัติ", "ค": "แนวทางการบริหารราชการเพื่อประโยชน์สุขของประชาชน", "ง": "แนวทางการบริหารราชการเพื่อให้เกิดผลสัมฤทธิ์ต่อภารกิจของรัฐ"}, "answer": "ค", "explanation": "แนวทางการบริหารราชการเพื่อประโยชน์สุขของประชาชน มาตรา 8 ในการบริหารราชการเพื่อประโยชน์สุขของประชาชน ส่วนราชการจะต้ อ ง ดำเนินการโดยถือว่าประชาชนเป็นศูนย์กลางที่จะได้รับการบริการจากรัฐ และจะต้องมีแนว ทางการบริหารราชการ ดังต่อไปนี้ (3) ก่อนเริ่มดำเนินการ ส่วนราชการต้องจัดให้มีการศึกษาวิเคราะห์ผลดีและผ"}, {"num": 11, "text": "ในการบริหารราชการ ก่อนจะดำเนินการสิ่งใด ส่วนราชการต้องดำเนินการตามข้อใด", "choices": {"ก": "จัดทำแผนปฏิบัติราชการไว้เป็นการล่วงหน้า", "ข": "โฆษณาประชาสัมพันธ์ให้ประชาชนทราบ", "ค": "แจ้งให้ประชาชนทราบก่อนเสมอ", "ง": "ปฏิบัติภารกิจโดยเร็วที่สุด"}, "answer": "ก", "explanation": "จัดทำแผนปฏิบัติราชการไว้เป็นการล่วงหน้า มาตรา 9 การบริหารราชการเพื่อให้เกิด ผลสัมฤทธิ์ต ่อภารกิจ ของรัฐ ให้ส่วนราชการ ปฏิบัติดังต่อไปนี้ ก่อนจะดำเนินการตามภารกิจใด ส่วนราชการต้องจัดทำแผนปฏิบัติ ร าชการ ไว้เป็นการล่วงหน้า กุล เท่ดัานัดแปลง ้น พิมพ์จำหน่ จาก IPายAddress แจกจ่า: ย110.164.194.141 โดยไม่"}, {"num": 12, "text": "ในการบริหารราชการเพื่อประโยชน์สุขของประชาชนนั้น ส่วนราชการจะต้องดำเนินการโดยยึดข้อ ใดเป็นศูนย์กลางในการบริหารการจัดการ", "choices": {"ก": "ความคุ้มค่า", "ข": "ประชาชน", "ค": "หน่วยงานของรัฐและเอกชน", "ง": "แผนปฏิบัติราชการ"}, "answer": "ข", "explanation": "ประชาชน มาตรา 8 ในการบริหารราชการเพื่อประโยชน์สุขของประชาชน ส่วนราชการจะต้ อ ง ดำเนินการโดยถือว่าประชาชนเป็นศูนย์กลางที่จะได้รับการบริการจากรัฐ และจะต้องมีแนว ทางการบริหารราชการ"}, {"num": 13, "text": "การกำหนดแผนปฏิบัติราชการของส่วนราชการต้องมีรายละเอียดตามข้อใด", "choices": {"ก": "ขั้นตอน", "ข": "ระยะเวลา", "ค": "เป้าหมายของภารกิจ", "ง": "ถูกทุกข้อ"}, "answer": "ง", "explanation": "ถูกทุกข้อ มาตรา 9 การบริหารราชการเพื่อให้เกิดผลสัมฤทธิ์ต่อภารกิจ ของรัฐ ให้ส่วน ราชการ ปฏิบัติดังต่อไปนี้ (2) การกำหนดแผนปฏิบัติราชการของส่วนราชการตาม (1) ต้องมีรายละเอี ยดของ ขั้นตอน ระยะเวลาและงบประมาณที่จะต้องใช้ในการดำเนินการของแต่ละขั้นตอน เป้าหมาย ของภารกิจ ผลสัมฤทธิ์ของภารกิจ และตัวชี้วัดความ"}, {"num": 14, "text": "การกระจายอำนาจการตัดสินใจนั้น มุ่งผลเรื่องใดเป็นหลัก", "choices": {"ก": "กำลังใจในการทำงาน", "ข": "ความสะดวกและรวดเร็วในการบริการประชาชน", "ค": "การบริหารแบบมีส่วนร่วม", "ง": "การทำงานเป็นทีม"}, "answer": "ข", "explanation": "ความสะดวกและรวดเร็วในการบริการประชาชน มาตรา 27 ให้ส่วนราชการจัดให้มีการกระจายอำนาจการตัด สินใจเกี่ยวกับการสั่ง การ อนุญาต การอนุมัติการปฏิบัติราชการ หรือการดำเนินการอื่นใดของผู้ดำรงตำแหน่งใดให้แก่ ผู้ ดำรงตำแหน่งที่มีหน้าที่รับผิดชอบในการดำเนิน การในเรื่ องนั้นโดยตรง เพื่อให้เกิดความ รวดเร็วและลดขั้"}, {"num": 15, "text": "ประเด็นในการประเมินผลการปฏิบัติราชการของส่วนราชการ มี 4 หัวข้อ ยกเว้นข้อใด", "choices": {"ก": "ความทั่วถึงในการให้บริการ", "ข": "ความพึงพอใจของประชาชนผู้รับบริการ", "ค": "ผลสัมฤทธิ์ของภารกิจ", "ง": "คุณภาพการให้บริการ"}, "answer": "ก", "explanation": "ความทั่วถึงในการให้บริการ มาตรา 45 นอกจากการจัดให้มีการประเมินผลตามมาตรา 9 (3) แล้ว ให้ส่วนราชการ จัดให้มีคณะผู้ประเมินอิสระดำเนินการประเมินผลการปฏิบัติราชการของส่วนราชการเกี่ยวกั บ ผลสัมฤทธิ์ของภารกิจ คุณภาพการให้บริการความพึงพอใจของประชาชนผู้รับบริการ ความ คุ้มค่าในภารกิจ ทั้งนี้ตามหลักเกณฑ์วิธีกา"}, {"num": 16, "text": "เมื่อนายกรัฐมนตรีพ้นจากตำแหน่ง ผู้ใดมีหน้าที่สรุปผลการปฏิบัติราชการ และให้ข้อมูลต่ อ นายกรัฐมนตรีคนใหม่", "choices": {"ก": "ปลัดกระทรวง", "ข": "หัวหน้าส่วนราชการ", "ค": "คณะกรรมการพัฒนาการเศรษฐกิจและสังคมแห่งชาติ ง. ผู้บัญชาการตำรวจแห่งชาติ"}, "answer": "ข", "explanation": "หัวหน้าส่วนราชการ มาตรา 19 เมื่อนายกรัฐมนตรีพ้นจากตำแหน่ง ให้หัวหน้าส่วนราชการมี หน้ า ที่ส รุ ป ผล การปฏิบัติราชการและให้ข้อมูลต่อนายกรัฐมนตรีคนใหม่ ตามที่นายกรัฐมนตรี คนใหม่ สั่ง การ ทั้งนี้เพื่อนายกรัฐมนตรีคนใหม่จะได้ใช้เป็นข้อมูลในการพิจารณากำหนดนโยบายการบริ ห าร ราชการแผ่นดินต่อไป"}, {"num": 17, "text": "การอำนวยความสะดวก และความรวดเร็วแก่ประชาชนในการติดต่อกับส่วนราชการทุกแห่ง หน่วยงานใดจัดให้มีระบบเครือข่ายสารสนเทศกลางขึ้น", "choices": {"ก": "หน่วยงานเอกชน", "ข": "กระทรวง ทบวง กรม", "ค": "กระทรวงดิจิทัลเพื่อเศรษฐกิจและสังคม", "ง": "จังหวัด อำเภอ"}, "answer": "ค", "explanation": "กระทรวงดิจิทัลเพื่อเศรษฐกิจและสังคม มาตรา 40 เพื่ออํานวยความสะดวกและความรวดเร็วแก่ประชาชนในการติดต่อกับ ส่วนราชการทุกแห่ง ให้กระทรวงเทคโนโลยีสารสนเทศและการสื่อสารจัดให้มีระบบเครือข่ าย สารสนเทศกลางขึ้น (**ปัจจุบัน กระทรวงเทคโนโลยีสารสนเทศและการสื่อสาร เปลี่ยนชื่อเป็น กระทรวงดิจิทัลเพื่อ เศรษฐกิจและส"}, {"num": 18, "text": "เพื่อประโยชน์ในการปฏิบ ัติร าชการให้ เกิดผลสัมฤทธิ์ ก.พ.ร. อาจเสนอต่อใคร เพื่อกำหนด มาตรการกำกับการปฏิบัติราชการ", "choices": {"ก": "รัฐสภา", "ข": "คณะรัฐมนตรี", "ค": "นายกรัฐมนตรี", "ง": "วุฒิสภา"}, "answer": "ข", "explanation": "คณะรัฐมนตรี มาตรา 12 เพื่อประโยชน์ในการปฏิบัต ิราชการให้เกิดผลสัมฤทธิ์ก.พ.ร. อาจเสนอต่อ คณะรัฐมนตรีเพื่อกำหนดมาตรการกำกับการปฏิบัติราชการ โดยวิธีการจัดทำความตกลงเป็น ลายลักษณ์อักษรหรือโดยวิธีการอื่นใด เพื่อแสดงความรับผิดชอบในการปฏิบัติราชการ"}, {"num": 19, "text": "ในวาระเริ่มแรก ให้สำนักงานพัฒนารัฐบาลดิจิทัล (องค์การมหาชน) จัดให้มีแพลตฟอร์มดิจิทัล กลางเพื่อให้ส่วนราชการใช้ในการบริการประชาชน และการติดต่อประสานงานระหว่างกันได้ ภายในกี่ วัน", "choices": {"ก": "15 วันนับแต่วันที่พระราชกฤษฎีกานี้ใช้บังคับ", "ข": "30 วันนับแต่วันที่พระราชกฤษฎีกานี้ใช้บังคับ", "ค": "60 วันนับแต่วันที่พระราชกฤษฎีกานี้ใช้บังคับ", "ง": "90 วันนับแต่วันที่พระราชกฤษฎีกานี้ใช้บังคับ"}, "answer": "ง", "explanation": "90 วันนับแต่วันที่พระราชกฤษฎีกานี้ใช้บังคับ มาตรา 10 (ฉบับ 2) ในวาระเริ่มแรก ให้สำนักงานพัฒนารัฐบาลดิจิทัล (องค์การมหาชน) จัดให้มีแพลตฟอร์มดิจิทัลกลางเพื่อให้ส่วนราชการใช้ในการบริการประชาชนและการติดต่อ ประสานงาน ระหว่างกันได้ภายในเก้าสิบวันนับแต่วันที่พระราชกฤษฎีกานี้ใช้บังคับ"}, {"num": 20, "text": "ให้เป็นหน้าที่ของหัวหน้าส่วนราชการที่จะต้องดำเนินการให้การบริการประชาชนและการติด ต่อ ประสานงานระหว่างส่วนราชการด้วยกัน โดยการใช้แพลตฟอร์มดิจิทัลกลางให้แล้วเสร็จภายในกี่ปี", "choices": {"ก": "1 ปีนับแต่พ้นกำหนดเวลา", "ข": "2 ปีนับแต่พ้นกำหนดเวลา", "ค": "3 ปีนับแต่พ้นกำหนดเวลา", "ง": "4 ปีนับแต่พ้นกำหนดเวลา"}, "answer": "ข", "explanation": "2 ปีนับแต่พ้นกำหนดเวลา มาตรา 10 (ฉบับ 2) ให้เป็นหน้าที่ของหัวหน้าส่วนราชการที่จ ะต้องดำเนิ นการให้ การ บริ ก ารประชาชนและการติ ด ต่ อ ประสานงานระหว่ า งส่ ว นราชการด้ วยกั น โดยการใช้ แพลตฟอร์มดิจิทัลกลางให้แล้วเสร็จภายในสองปีนับแต่พ้นกำหนดเวลาตามวรรคหนึ่ง"}, {"num": 21, "text": "ให้ส่วนราชการจัดทำบัญชีต้นทุนในงานบริการสาธารณะแต่ละประเภทขึ้นตามหลักเกณฑ์ และ วิธีการที่หน่วยงานใดกำหนด", "choices": {"ก": "ก.พ.ร.", "ข": "กรมบัญชีกลาง", "ค": "สำนักงบประมาณ", "ง": "สำนักงานตรวจเงินแผ่นดิน"}, "answer": "ข", "explanation": "กรมบัญชีกลาง มาตรา 21 ให้ส่วนราชการจัดทำบัญชีต้นทุนในงานบริการสาธารณะแต่ละประเภท ขึ้น ตามหลักเกณฑ์และวิธีการที่กรมบัญชีกลางกำหนด"}, {"num": 22, "text": "ในการบริหารราชการจะให้เกิดผลสัมฤทธิ์ได้นั้นสิ่งสำคัญที่จะต้องมีคือข้อใด", "choices": {"ก": "แผนปฏิบัติราชการ", "ข": "นโยบาย", "ค": "แผนปฏิบัติภารกิจ", "ง": "แผนพัฒนา"}, "answer": "ก", "explanation": "แผนปฏิบัติราชการ มาตรา 9 การบริหารราชการเพื่อให้เกิด ผลสัมฤทธิ์ต ่อภารกิจ ของรัฐ ให้ส่วนราชการ ปฏิบัติดังต่อไปนี้ (1) ก่อนจะดำเนินการตามภารกิจใด ส่วนราชการต้องจัดทำแผนปฏิบัติราชการไว้ เป็น การล่วงหน้า"}, {"num": 23, "text": "ก.พ.ร. คือหน่วยงานใด", "choices": {"ก": "คณะกรรมการพัฒนาระบบส่วนราชการ", "ข": "คณะกรรมการพัฒนาข้าราชการ", "ค": "คณะกรรมการพัฒนาระบบข้าราชการ", "ง": "คณะกรรมการพัฒนาระบบราชการ"}, "answer": "ง", "explanation": "คณะกรรมการพัฒนาระบบราชการ สำนักงานคณะกรรมการพัฒนาระบบราชการ หรือชื่อย่อ สำนักงาน ก.พ.ร. เป็นส่วน ราชการไทยประเภทกรม สังกัด สำนักนายกรัฐมนตรี มีหน้าที่ริเริ่ม ผลักดัน และเสนอแนะ นโยบายต่อคณะรัฐมนตรีในเรื่องที่เป็นประโยชน์ต่อการปฏิบัติราชการ และการพัฒ นาระบบ ราชการ ผ่านกลไกต่าง ๆ (ก.พ.ร. อ.ก.พ.ร. คตป."}, {"num": 24, "text": "องค์กรปกครองส่วนท้องถิ่นจะต้องจัดทำหลักเกณฑ์การบริหารกิจการบ้านเมืองที่ ดีต ามแนวทาง ของภารกิจนี้อย่างน้อยจะต้องมีหลักเกณฑ์เกี่ยวข้องกับข้อใดบ้าง", "choices": {"ก": "เกิดความคุ้มค่าและเกิดผลสัมฤทธิ์", "ข": "เกิดผลสัมฤทธิ์ต่อภารกิจของรัฐ และเกิดความคุ้มค่าในเชิงภารกิจของรัฐ", "ค": "การลดขั้นตอนการปฏิบัติงานและการอำนวยความสะดวกและตอบสนองความต้องการของ", "ง": "เกิดประโยชน์สูงสุดของประชาชนและไม่มีขั้นตอนการปฏิบัติเกินความจำเป็น"}, "answer": "ค", "explanation": "การลดขั้นตอนการปฏิบัต ิงานและการอำนวยความสะดวกและตอบสนองความ ต้องการของประชาชน มาตรา 52 ให้องค์กรปกครองส่วนท้องถิ่นจัดทำหลักเกณฑ์การบริหารกิจ การ บ้านเมือง ที่ดีตามแนวทางของพระราชกฤษฎีกานี้โดยอย่างน้อยต้องมีหลักเกณฑ์เกี่ยวกับการลด ขั้นตอน การปฏิบัติงาน และการอำนวยความสะดวกและการตอบสนองความต้องการของ"}, {"num": 25, "text": "การสั่งราชการโดยปกติให้กระทำเป็นลายลัก ษณ์อักษร เว้นแต่ในกรณีที่ผู้บังคับบั ญชาจะดำเนิน อย่างไร", "choices": {"ก": "สั่งราชการด้วยภาษามือ", "ข": "สั่งการทางโทรศัพท์", "ค": "สั่งราชการด้วยวาจา", "ง": "ถูกทุกข้อ"}, "answer": "ค", "explanation": "สั่งราชการด้วยวาจา มาตรา 26 การสั่งราชการโดยปกติให้กระทำเป็นลายลักษณ์อั กษร เว้นแต่ในกรณีที่ ผู้บังคับบัญชามีความจําเป็นที่ไม่อาจสั่งเป็นลายลักษณ์อักษรในขณะนั้น จะสั่งราชการด้วย วาจาก็ได้ แต่ให้ผู้รับคำสั่งนั้นบันทึกคำสั่งด้วยวาจาไว้เป็นลายลักษณ์อั กษรและเมื่ อได้ ปฏิ บัติ ราชการตามคำสั่ง ดังกล่าวแล"}, {"num": 26, "text": "ในทางปฏิบัติตามบริหารราชการเพื่อประโยชน์สุขของประชาชน หากมีกรณีที่เกิดปัญหาและ อุปสรรคจากดำเนินการให้ส่วนราชการปฏิบัติอย่างไร", "choices": {"ก": "แก้ไขปัญหาและอุปสรรคนั้นโดยเร็ว", "ข": "แจ้ง ก.พ.ร. ทราบ", "ค": "แจ้งให้ส่วนราชการที่เกี่ยวข้องให้ทราบปัญหา ง. แจ้งผู้บังคับบัญชาทราบ"}, "answer": "ก", "explanation": "แก้ไขปัญหาและอุปสรรคนั้นโดยเร็ว มาตรา 8 (5) ในกรณีที่เกิด ปัญหาและอุปสรรคจากการดำเนินการ ให้ส่วนราชการ ดำเนินการ แก้ไขปัญหาและอุปสรรคนั้นโดยเร็ว ในกรณีที่ปัญหาหรืออุปสรรคนั้ นเกิด ขึ้นจาก ส่วนราชการอื่นหรือ ระเบียบข้อบังคับที่ออกโดยส่วนราชการอื่น ให้ส่วนราชการแจ้ งให้ ส่ วน ราชการที่เกี่ยวข้องทราบเพ"}, {"num": 27, "text": "การปฏิบัติราชการภายในส่วนราชการเพื่อให้เป็นไปอย่างมีประสิทธิภาพ ส่วนราชการต้องกำหนด ข้อใดไว้ในโครงการ", "choices": {"ก": "ระยะเวลาแล้วเสร็จของโครงการ", "ข": "เป้าหมาย", "ค": "แผนการทำงาน", "ง": "ถูกทุกข้อ"}, "answer": "ง", "explanation": "ถูกทุกข้อ มาตรา 20 เพื่อให้การปฏิบัติราชการภายในส่วนราชการเป็นไปอย่างมีประสิทธิภาพ ให้ ส่วนราชการกำหนดเป้าหมาย แผนการทำงาน ระยะเวลาแล้วเสร็จของงานหรือโครงการ และ งบประมาณที ่ จ ะต้อ งใช้ ใ นแต่ ละงานหรื อ โครงการ และต้ อ งเผยแพร่ ให้ ข้ า ราชการและ ประชาชนทราบทั่วกันด้วย"}, {"num": 28, "text": "ใครเป็นผู้รักษาการตามพระราชกฤษฎีกาว่าด้วยหลักเกณฑ์ และวิธีการบริหารกิจการบ้านเมืองที่ดี พ.ศ. 2546", "choices": {"ก": "รองนายกรัฐมนตรีที่ได้รับมอบหมาย", "ข": "รัฐมนตรีว่าการกระทรวงมหาดไทย", "ค": "นายกรัฐมนตรี", "ง": "ปลัดกระทรวงมหาดไทย"}, "answer": "ค", "explanation": "นายกรัฐมนตรี มาตรา 5 ให้นายกรัฐมนตรีรักษาการตามพระราชกฤษฎีกานี้"}, {"num": 29, "text": "การบริหารกิจการบ้านเมืองที่ดีนั้น จะต้องบริหารราชการให้บรรลุเป้าหมายกี่ประการ", "choices": {"ก": "5 ประการ", "ข": "6 ประการ", "ค": "7 ประการ", "ง": "8 ประการ"}, "answer": "ค", "explanation": "7 ประการ มาตรา 6 การบริหารกิจ การบ้านเมืองที่ดี ได้แก่ การบริหารราชการเพื่อบรรลุเป้ าหมาย ดังต่อไปนี้ (1) เกิดประโยชน์สุขของประชาชน (2) เกิดผลสัมฤทธิ์ต่อภารกิจของรัฐ (3) มีประสิทธิภาพและเกิดความคุ้มค่าในเชิงภารกิจของรัฐ (4) ไม่มีขั้นตอนการปฏิบัติงานเกินความจำเป็น (5) มีการปรับปรุงภารกิจของส่วนราชการ"}, {"num": 30, "text": "ในการดำเนินงานในส่วนงานราชการเพื่อให้การดำเนินงานเป็นไปอย่างมีประสิทธิภาพ หน่วยงาน ต้องดำเนินการตามข้อใด", "choices": {"ก": "กำหนดเป้าหมาย แผนการทำงาน", "ข": "กำหนดงบประมาณที่จะต้องใช้ในแต่ละงานหรือโครงการ", "ค": "เผยแพร่ให้ข้าราชการและประชาชนทราบทั่วกันด้วย", "ง": "ถูกทุกข้อ"}, "answer": "ง", "explanation": "ถูกทุกข้อ มาตรา 20 เพื่อให้การปฏิบัติราชการภายในส่วนราชการเป็นไปอย่างมีประสิทธิภาพ ให้ ส่วนราชการกำหนดเป้าหมาย แผนการทำงาน ระยะเวลาแล้วเสร็จของงานหรือโครงการ และ เฉลยแนวข้อสอบสรุปสาระสำคัญพระราชกฤษฎีกาว่าด้วยหลักเกณฑ์และวิธีการบริหารกิจการ                             175 บ้านเมืองที่ดี พ.ศ. 2546 และ"}, {"num": 31, "text": "ส่วนราชการจัดให้มีการกระจายอำนาจการตัดสินใจเกี่ยวกับเรื่องใด", "choices": {"ก": "การสั่งการ", "ข": "การอนุญาต", "ค": "การอนุมัติการ", "ง": "ถูกทุกข้อ"}, "answer": "ง", "explanation": "ถูกทุกข้อ มาตรา 27 ให้ส่วนราชการจัดให้มีการกระจายอำนาจการตัดสินใจเกี่ยวกับการสั่ง การอนุญาต การอนุมัติการปฏิบัติราชการ หรือการดำเนินการอื่นใดของผู้ดำรงตำแหน่ งใด ให้แก่ผู้ดำรงตำแหน่งที่มีหน้าที่รับผิดชอบในการดำเนินการในเรื่องนั้นโดยตรง เพื่อให้เกิด ความรวดเร็วและลดขั้นตอนการปฏิ บัต ิ ราชการ ทั้งนี้ใ"}, {"num": 32, "text": "การบริการประชาชนและการติดต่อประสานงานระหว่างส่วนราชการ ต้องกระทำตามข้อใด", "choices": {"ก": "จัดทำแผนการปฏิบัติราชการ", "ข": "จัดทำแผนการลดรายจ่าย", "ค": "ใช้แพลตฟอร์มดิจิทัลกลางที่สำนักงานพัฒนารัฐบาลดิจิทัล", "ง": "ถูกทุกข้อ"}, "answer": "ค", "explanation": "ใช้แพลตฟ นคณะรัฐมนตรีทั้งหมดที่มีอยู่"}, "answer": "ข", "explanation": "ไม่น้อยกว่า 1 ใน 3 ของจำนวนคณะรัฐมนตรีทั้งหมดที่มีอยู่ มาตรา 8 การประชุมคณะรัฐมนตรี ในกรณีปกติให้ดำเนินการได้เ มื่ อมี รั ฐมนตรี เข้าร่วมประชุมไม่น้อยกว่าหนึ่งในสามของจำนวนคณะรัฐมนตรีทั้งหมดที่มีอยู่"}, {"num": 5, "text": "ในกรณีจำเป็นเพื่อเป็นการรักษาประโยชน์สำคัญของประเทศ หรือมีกรณีฉุกเฉินหรือเพื่อประโยชน์ ในการรักษาความลับ บุคคลใดอาจพิจารณาเรื่องใดกับรัฐมนตรีที่เกี่ยวข้องตามที่นายกรัฐมนตรี เห็นสมควรเพื่อมีมติของคณะรัฐมนตรีในเรื่องนั้นได้", "choices": {"ก": "คณะรัฐมนตรี", "ข": "นายกรัฐมนตรี", "ค": "เลขาธิการคณะรัฐมนตรี", "ง": "ถูกทุกข้อ"}, "answer": "ข", "explanation": "นายกรัฐมนตรี มาตรา 8 การประชุมคณะรัฐมนตรี ในกรณีปกติให้ดำเนินการได้เ มื่ อมี รั ฐมนตรี เข้าร่วมประชุมไม่น้อยกว่าหนึ่งในสามของจำนวนคณะรัฐมนตรีทั้งหมดที่มีอยู่ ในกรณีจำเป็นเพื่อเป็นการรักษาประโยชน์สำคัญของประเทศ หรือมีกรณีฉุ ก เฉิน หรือเพื่อประโยชน์ในการรักษาความลับ นายกรัฐมนตรีอาจพิจารณาเรื่องใดกับรั"}, {"num": 6, "text": "ในการประชุมคณะรัฐมนตรีในกรณีปกติ สำนักเลขาธิการคณะรัฐมนตรีต้องจัดส่งวาระการประชุม พร้อมด้วยเอกสารที่เกี่ยวข้องให้คณะรัฐมนตรีทราบล่วงหน้ากี่วัน", "choices": {"ก": "ไม่น้อยกว่า 1 วันก่อนการประชุมคณะรัฐมนตรี", "ข": "ไม่น้อยกว่า 3 วันก่อนการประชุมคณะรัฐมนตรี", "ค": "1 วันก่อนการประชุมคณะรัฐมนตรี", "ง": "3 วันก่อนการประชุมคณะรัฐมนตรี"}, "answer": "ก", "explanation": "ไม่น้อยกว่า 1 วันก่อนการประชุมคณะรัฐมนตรี มาตรา 9 ในการประชุมคณะรัฐมนตรีในกรณีปกติตามมาตรา 8 วรรคหนึ่ง สำนัก เลขาธิ ก ารคณะรั ฐ มนตรี ต้อ งจัด ส่ ง วาระการประชุม พร้อ มด้ ว ยเอกสารที ่เ กี ่ย วข้ องให้ คณะรัฐมนตรีทราบล่วงหน้าไม่น้อยกว่าหนึ่งวันก่อนการประชุมคณะรัฐมนตรี เว้นแต่กรณีมี ความจำเป็นเร่งด่ว"}, {"num": 7, "text": "ข้อใดกล่าวถูกต้อง", "choices": {"ก": "การส่งวาระการประชุมและเอกสารที่เกี่ยวข้อง จะส่งโดยวิธีการทางอิเล็กทรอนิกส์ก็ได้", "ข": "การส่งวาระการประชุมและเอกสารที่เกี่ยวข้อง จะส่งโดยวิธีการทางอิเล็กทรอนิกส์เท่านั้น", "ค": "การประชุมคณะรัฐมนตรี ในกรณีปกติให้ดำเนินการได้เมื่อมีรัฐมนตรีเข้าร่วมประชุมไม่น้อย", "ง": "ถูกทุกข้อ"}, "answer": "ก", "explanation": "การส่งวาระการประชุมและเอกสารที่เกี่ยวข้อง จะส่งโดยวิธีการทาง อิเล็กทรอนิกส์ก็ได้"}, {"num": 8, "text": "ทุกครั้งที่คณะรัฐมนตรีชุดใหม่เข้ารับหน้าที่ ให้เป็นหน้าที่ของสำนักเลขาธิการคณะรัฐมนตรี รวบรวมมติของคณะรัฐมนตรีหรือคำสั่งของนายกรัฐมนตรีชุดเดิมที่เกี่ยวกับการบริหารราชการ หรือ ข้าราชการ ที่ออกโดยมิได้อาศัยอำนาจตามกฎหมายใด พร้อมด้วยข้อเสนอแนะว่าสมควรคงคำสั่งของ นายกรัฐมนตรีหรือมติของคณะรัฐมนตรีในเรื่องนั้นต่อไปหรือไม่ เพียงใด และนำเสนอนายกรัฐมนตรี เพื่อพิจารณาสั่งการหรือดำเนินการต่อไปภายในกี่วัน", "choices": {"ก": "ภายใน 30 วันนับแต่วันที่คณะรัฐมนตรีแถลงนโยบายต่อรัฐสภา", "ข": "ภายใน 60 วันนับแต่วันที่คณะรัฐมนตรีแถลงนโยบายต่อรัฐสภา", "ค": "ภายใน 90 วันนับแต่วันที่คณะรัฐมนตรีแถลงนโยบายต่อรัฐสภา", "ง": "ภายใน 120 วันนับแต่วันที่คณะรัฐมนตรีแถลงนโยบายต่อรัฐสภา"}, "answer": "ง", "explanation": "ภายใน 120 วันนับแต่วันที่คณะรัฐมนตรีแถลงนโยบายต่อรัฐสภา มาตรา 13 ทุกครั้งที่คณะรัฐมนตรีชุดใหม่เข้ารับหน้าที่ ให้เป็นหน้า ที่ข องสำนัก เลขาธิการคณะรัฐมนตรี รวบรวมมติของคณะรัฐมนตรีหรือคำสั่งของนายกรัฐมนตรีชุดเดิมที่ เกี่ยวกับการบริหารราชการ หรือข้าราชการ ที่ออกโดยมิได้อาศัยอำนาจตามกฎหมายใด พร้อมด้วยข้"}, {"num": 9, "text": "หน่วยงานใดตรวจสอบคำสั่งของนายกรัฐมนตรีและมติของคณะรัฐมนตรีที่เกี่ยวกับการเสนอเรื่อง ต่อคณะรัฐมนตรี การบริหารราชการ และข้าราชการ ที่มีผลบังคับอยู่ก่อนวันที่พระราชกฤษฎีกานี้ใช้ บังคับ พร้อมกับข้อเสนอแนะว่าคำสั่งของนายกรัฐมนตรี หรือมติของคณะรัฐมนตรีในเรื่องใดควร ยกเลิกหรือปรับปรุงแก้ไขให้สอดคล้องกับแนวทางตามพระราชกฤษฎีกานี้", "choices": {"ก": "สำนักนายกรัฐมนตรี", "ข": "สำนักเลขาธิการคณะรัฐมนตรี", "ค": "คณะรัฐมนตรี", "ง": "ถูกทุกข้อ"}, "answer": "ข", "explanation": "สำนักเลขาธิการคณะรัฐมนตรี มาตรา 14 ให้สำนักเลขาธิการคณะรัฐมนตรีต รวจสอบคำสั่งของนายกรั ฐมนตรี และมติของคณะรัฐมนตรีที่เกี่ยวกับการเสนอเรื่องต่อคณะรัฐมนตรี การบริหารราชการ และ ข้าราชการ ที่มีผลบังคับอยู่ก่อนวันที่พระราชกฤษฎีกานี้ใช้บังคับ พร้อมกับข้ อเสนอแนะว่า คำสั่งของนายกรัฐมนตรี หรือมติของคณะรัฐมน"}, {"num": 10, "text": "จากข้อ 9 โดยต้องดำเนินการให้แล้วเสร็จภายในกี่ปี", "choices": {"ก": "1 ปีนับแต wer": "ง", "explanation": "ลับมาก ข้อ 14 ลับมาก หมายความถึง ข้อมูลข่าวสารลับซึ่งหากเปิดเผยทั้งหมดหรือเพียง บางส่วนจะก่อให้เกิดความเสียหายแก่ประโยชน์แห่งรัฐอย่างร้ายแรง"}, {"num": 9, "text": "ใครมีหน้าที่กำหนดชั้นความลับ", "choices": {"ก": "หัวหน้าหน่วยงานของรัฐ", "ข": "รองหัวหน้าหน่วยงานรัฐ", "ค": "ทุกคนกำหนดชั้นความลับได้", "ง": "ไม่ได้กำหนด"}, "answer": "ก", "explanation": "หัวหน้าหน่วยงานของรัฐ ข้อ 16 ให้หัวหน้าหน่วยงานของรัฐมีหน้าที่รับผิดชอบในการกำหนดชั้นความลับ ..."}, {"num": 10, "text": "ถ้าเป็นกรณีเร่งด่วน ใครมีอำนาจกำหนดชั้นความลับเป็นการชั่วคราวได้และให้รีบเสนอต่อผู้มี อำนาจกำหนดชั้นความลับ", "choices": {"ก": "หัวหน้าหน่วยงานของรัฐ", "ข": "เจ้าหน้าที่ที่เกี่ยวข้อง", "ค": "ผู้ที่ได้รับมอบหมาย", "ง": "ถูกทุกข้อ"}, "answer": "ข", "explanation": "เจ้าหน้าที่ที่เกี่ยวข้อง ข้อ 17 ในกรณีที่มีความจำเป็นเร่งด่วน เจ้าหน้าที่ที่เกี่ยวข้องมีอำนาจกำหนดชั้ น ความลับเป็นการชั่วคราวได้แ ละให้ร ีบเสนอต่อ ผู้ม ีอ ำนาจกำหนดชั้ นความลั บเพื่อ สั่ง การ เกี่ยวกับการกำหนดชั้นความลับต่อไปทันที"}, {"num": 11, "text": "การกำหนดให้ข้อมูลข่าวสารอยู่ในชั้นความลับใด ให้พิจารณาถึงองค์ประกอบอย่างน้อยตามข้อใด", "choices": {"ก": "ความสำคัญของเนื้อหา", "ข": "วิธีการนำไปใช้ประโยชน์", "ค": "จำนวนบุคคลที่ควรรับทราบ", "ง": "ถูกทุกข้อ"}, "answer": "ง", "explanation": "ถูกทุกข้อ ข้อ 19 การกําหนดให้ข้อมูลข่าวสารอยู่ในชั้นความลับใด ให้พิจารณาถึงองค์ป ระกอบ อย่างน้อย ดังต่อไปนี้ (1) ความสำคัญของเนื้อหา (2) แหล่งที่มาของข้อมูลข่าวสาร (3) วิธีการนําไปใช้ประโยชน์ (4) จำนวนบุคคลที่ควรรับทราบ (5) ผลกระทบหากมีการเปิดเผย (6) หน่วยงานของรัฐที่รับผิดชอบในฐานะเจ้าของเรื่องหรือ"}, {"num": 12, "text": "ข้อใดไม่ถูกต้องเกี่ยวกับการแสดงชั้นความลับ", "choices": {"ก": "เครื่องหมายแสดงชั้นความลับให้ใช้อักษรตามชั้นความลับที่มีขนาดใหญ่กว่าปกติ", "ข": "อักษรชั้นความลับใช้สีแดงเท่านั้น", "ค": "การแสดงชั้นความลับ ให้แสดงกลางหน้าทั้งด้านบนและด้านล่างของทุกหน้าเอกสาร", "ง": "การแสดงชั้นความลับ ถ้าเอกสารเข้าปกให้แสดงไว้ที่ด้านนอกของปกหน้า ปกหลังด้วย"}, "answer": "ข", "explanation": "อักษรชั้นความลับใช้สีแดงเท่านั้น ข้อ 21 เครื่องหมายแสดงชั้นความลับให้ใช้ตัวอักษรตามชั้นความลับที่ขนาดใหญ่ ก ว่า ตัวอักษรธรรมดา โดยใช้สีแดงหรือสีอื่นที่สามารถมองเห็นได้เด่นและชัดเจน ข้อ 22 การแสดงชั้นความลับให้ปฏิบัติดังนี้ (1) ข้อมูลข่าวสารที่มีสภาพเป็นเอกสารให้แสดงชั้นความลับที่กลางหน้ากระดาษ ทั้ง "}, {"num": 13, "text": "ข้อใดกล่าวไม่ถูกต้อง", "choices": {"ก": "การปรับชั้นความลับต้องทำโดยผู้มีอำนาจกำหนดชั้นความลับของหน่วยงานเจ้าของเรื่อง", "ข": "การแก้ไขชั้นความลับ ห้ามให้ขีดฆ่าเครื่องหมายแสดงชั้นความลับ", "ค": "ให้หัวหน้าหน่วยงานของรัฐแต่งตั้งเจ้าหน้าที่ควบคุมเรียกว่า “นายทะเบียนข้อมูลข่าวสารลับ”", "ง": "แบบทะเบียนรับข้อมูลข่าวสารลับให้เป็นไปตามที่นายกรัฐมนตรีกำหนดโดยประกาศในราช"}, "answer": "ข", "explanation": "การแก้ไขชั้นความลับ ห้ามให้ขีดฆ่าเครื่องหมายแสดงชั้นความลับ ข้อ 23 การปรับ ชั้ นความลับ ต้องกระทำโดยผู้ม ีอ ำนาจกำหนดชั้นความลับ ของ หน่วยงานเจ้าของเรื่อง การแก้ ไ ขชั ้ น ความลั บ ให้ ข ี ด ฆ่ า เครื ่ อ งหมายแสดงชั ้ น ความลั บ เดิ ม แล้ ว แสดง เครื่องหมาย ชั้นความลับที่กำหนดใหม่ (ถ้ามี) ไว้ใกล้กั"}, {"num": 14, "text": "ให้มีคณะกรรมการตรวจสอบ ประกอบด้วยอย่างน้อยกี่คน", "choices": {"ก": "ไม่น้อยกว่า 3 คน", "ข": "ไม่น้อยกว่า 4 คน", "ค": "ไม่น้อยกว่า 5 คน", "ง": "ไม่น้อยกว่า 6 คน"}, "answer": "ก", "explanation": "ไม่น้อยกว่า 3 คน ข้อ 29 ให้หัวหน้าหน่วยงานของรัฐแต่งตั้งคณะกรรมการตรวจสอบ ประกอบด้วย นายทะเบียนข้อมูลข่าวสารลับเป็นประธานกรรมการ และเจ้าหน้าที่อื่นอีกไม่น้อยกว่ าสองคน เป็นกรรมการ"}, {"num": 15, "text": "ให้คณะกรรมการตรวจสอบทำการตรวจสอบความถูกต้องในการปฏิบัติตามระเบียบนี้และการมีอยู่ ของข้อมูลข่าวสารลับที่มีอยู่ในทะเบียนข้อมูลข่าวสารลับทุกกี่เดือน", "choices": {"ก": "ทุกเดือน", "ข": "อย่างน้อยทุก 3 เดือน", "ค": "ทุก 6 เดือน", "ง": "อย่างน้อยทุก 6 เดือน"}, "answer": "ง", "explanation": "อย่างน้อยทุก 6 เดือน ข้อ 29 ให้หัวหน้าหน่วยงานของรัฐแต่งตั้งคณะกรรมการตรวจสอบ ประกอบด้วย นายทะเบียนข้อมูลข่าวสารลับเป็นประธานกรรมการ และเจ้าหน้าที่อื่นอีกไม่น้อยกว่ าสองคน เป็นกรรมการ ทำการตรวจสอบความถูกต้องในการปฏิบัต ิตามระเบียนนี้และการมีอยู่ของ ข้อมูลข่าวสารลับที่มีอยู่ใน ทะเบียนข้อมูลข่าวสารลับ"}, {"num": 16, "text": "การเก็บรักษาข้อมูลข่าวสารลับ ให้เป็นไปตามคำแนะนำของใคร", "choices": {"ก": "องค์การรักษาความปลอดภัย", "ข": "นายกรัฐมนตรี", "ค": "หอจดหมายเหตุแห่งชาติ", "ง": "ถูกทุกข้อ"}, "answer": "ก", "explanation": "องค์การรักษาความปลอดภัย ข้อ 44 การเก็บรักษาข้อมูลข่าวสารลับ ให้หน่วยงานของรัฐเก็บรักษาไว้ในที่ปลอดภัย และให้กำหนดระเบียบการเก็บรักษาข้อมูลข่าวสารลับไว้เป็นการเฉพาะตามคำแนะนำของ องค์การ รักษาความปลอดภัย"}, {"num": 17, "text": "การสั่งทำลายข้อมูลข่าวสารลับให้หน่วยงานใดพิจารณาก่อนว่าไม่มีคุณค่าในการเก็บรักษา", "choices": {"ก": "องค์การรักษาความปลอดภัย", "ข": "นายกรัฐมนตรี", "ค": "หอจดหมายเหตุแห่งชาติ", "ง": "ถูกทุกข้อ"}, "answer": "ค", "explanation": "หอจดหมายเหตุแห่งชาติ ข้อ 46 ...หัวหน้าหน่วยงานของรัฐจะสั่งทำลายข้อมูลข่าวสารลับนอกจากกรณีต ามวรรค หนึ่งได้ ต่อเมื่อได้ส่งข้อมูลข่าวสารลับให้หอจดหมายเหตุแห่งชาติ พิจารณาก่อ นว่ าไม่ มีคุณ ค่า ในการเก็บรักษา กุล เท่ดัานัดแปลง ้น พิมพ์จำหน่ จาก IPายAddress แจกจ่า: ย110.164.194.141 โดยไม่ได้รับอนุญาต 20"}, {"num": 18, "text": "คณะกรรมการทำลายข้อมูลข่าวสารลับประกอบด้วยกี่คน", "choices": {"ก": "ไม่น้อยกว่า 3 คน", "ข": "ไม่น้อยกว่า 4 คน", "ค": "ไม่น้อยกว่า 5 คน", "ง": "ไม่น้อยกว่า 6 คน"}, "answer": "ก", "explanation": "ไม่น้อยกว่า 3 คน ข้อ 46 ... ในการสั่งทำลายข้อมูลข่าวสารลับ ให้หัวหน้าหน่วยงานของรัฐแต่งตั้งคณะกรรมการ ทำลาย ข้อมูลข่าวสารลั บขึ ้นคณะหนึ ่ง ประกอบด้วยนายทะเบี ยนข้อ มูล ข่ าวสารลับ เป็ น ประธานกรรมการและ เจ้าหน้าที่ที่เกี่ยวข้องอีกไม่น้อยกว่าสองคนเป็นกรรมการ..."}, {"num": 19, "text": "ใครเป็นประธานกรรมการในคณะกรรมการทำลายข้อมูลข่าวสารลับ", "choices": {"ก": "หัวหน้าหน่วยงานรัฐ", "ข": "เจ้าหน้าที่ที่มีอำนาจ", "ค": "นายทะเบียนข้อมูลข่าวสารลับ", "ง": "ผู้ที่หัวหน้าหน่วยงานของรัฐแต่งตั้ง"}, "answer": "ค", "explanation": "นายทะเบียนข้อมูลข่าวสารลับ ข้อ 46 ... ในการสั่งทำลายข้อมูลข่าวสารลับ ให้หัวหน้าหน่วยงานของรัฐแต่งตั้งคณะกรรมการ ทำลาย ข้อมูลข่าวสารลั บขึ ้นคณะหนึ ่ง ประกอบด้วยนายทะเบี ยนข้อ มูล ข่ าวสารลับ เป็ น ประธานกรรมการและ เจ้าหน้าที่ที่เกี่ยวข้องอีกไม่น้อยกว่าสองคนเป็นกรรมการ..."}, {"num": 20, " งให้หน่วยงานของรัฐที่เห็นว่า น่าจะเกี่ยวข้องกับเรื่องดังกล่าวทราบถึงการเสนอเรื่องต่อคณะรัฐมนตรีพร้อมทั้งแจ้งประมาณการว่า จะมีการนำเรื่องเข้าพิจารณาในคณะรัฐมนตรีในวันใด", "choices": {"ก": "ภายใน 15 วัน", "ข": "ภายใน 10 วัน", "ค": "ภายใน 7 วัน", "ง": "ภายใน 3 วัน"}, "answer": "ง", "explanation": "ภายใน 3 วัน"}, {"num": 11, "text": "หากหน่วยงานของรัฐดังกล่าวมีข้อเสนอแนะหรือความคิดเห็นอย่างใดให้เสนอมายังสำนัก เลขาธิการคณะรัฐมนตรีก่อนวันนำเรื่องเสนอคณะรัฐมนตรีไม่ช้ากว่ากี่วัน", "choices": {"ก": "ไม่ช้ากว่า 5 วัน", "ข": "ไม่ช้ากว่า 10 วัน", "ค": "ไม่ช้ากว่า 15 วัน", "ง": "ไม่ช้ากว่า 20 วัน"}, "answer": "ก", "explanation": "ไม่ช้ากว่า 5 วัน"}, {"num": 12, "text": "การเสนอเรื่องทั่วไป อยู่ในหมวดที่เท่าไหร่", "choices": {"ก": "1 หมวด", "ข": "2 หมวด", "ค": "3 หมวด", "ง": "4 หมวด"}, "answer": "ค", "explanation": "3 หมวด"}, {"num": 13, "text": "ในหนังสือนำส่งเรื่องเสนอคณะรัฐมนตรี ให้หน่วยงานของรัฐเจ้าของเรื่องสรุปเรื่องให้ชัดเจนและ ครบถ้วน โดยอย่างน้อยต้องมีสาระตามข้อใด", "choices": {"ก": "เรื่องเดิม (ถ้ามี)", "ข": "เหตุผลความจำเป็นที่ต้องเสนอคณะรัฐมนตรี", "ค": "ความเร่งด่วนของเรื่อง (ถ้ามี) โดยระบุวันสุดท้ายที่จะต้องดำเนินการเรื่องนั้นไว้ด้วย", "ง": "ถูกทุกข้อ"}, "answer": "ง", "explanation": "ถูกทุกข้อ ข้อ 13 ในหนังสือนำส่งเรื่องเสนอคณะรัฐมนตรี ให้หน่วยงานของรัฐเจ้าของเรื่อง สรุปเรื่องให้ชัดเจนและครบถ้วน โดยอย่างน้อยต้องมีสาระสำคัญดังนี้ (1) เรื่องเดิม (ถ้ามี) (2) เหตุผลความจำเป็นที่ต้องเสนอคณะรัฐมนตรี (3) ความเร่งด่วนของเรื่อง (ถ้ามี) โดยระบุวันสุดท้ายที่จะต้องดำเนินการเรื่องนั้นไว้ด้วย"}, {"num": 14, "text": "การเสนอเรื่องต่อคณะรัฐมนตรี เพื่อขอให้มีการตราพระราชบัญญัติขึ้นนอกจากจะต้องดำเนินการ ตามหมวด 3 แล้ว หน่วยงานของรัฐต้องดำเนินการตามข้อใด", "choices": {"ก": "จัดทำคำชี้แจงตามหลักเกณฑ์ในการตรวจสอบความจำเป็นในการตรา พระราชบัญญัติท้าย", "ข": "จัดทำสรุปสาระสำคัญของหลักการในร่างพระราชบัญญัติ", "ค": "จัดทำตารางเปรียบเทียบในกรณีแก้ไขเพิ่มเติมหรือปรับปรุงพระราชบัญญัติที่มีอยู่แล้ว", "ง": "ถูกทุกข้อ"}, "answer": "", "explanation": ""}, {"num": 15, "text": "ในกรณีที่คณะรัฐมนตรีมีม ามสำเร็จของการตรวจสอบ ร่างอนุบัญญัติแล้วเสร็จภายในเวลาที่กำหนด (กคอ.) 1.4 การจัดประชุมคณะรัฐมนตรีมีมาตรฐาน               1.4.1 ร้อยละความพึงพอใจของผู้ประสานงาน และพร้อมตอบสนองต่อการเปลี่ยนแปลง                  ในการจัดประชุมคณะรัฐมนตรี (กปค.) 1.4.2 จำนวนครั้งของการผลิตเอกสารเรื่อง จำเป็น/เร่งด่วน ไม่ทันต่อการประชุม/การ พิจารณาของคณะรัฐมนตรี (กปค.) แนวทางการพัฒนา                                          1) สร้างความเข้าใจให้แก่ส่วนราชการเกี่ยวกับ แนวปฏิบัติในการเสนอเรื่องฯ ตาม พ.ร.ฎ. เสนอ กุล เท่ดัานัดแปลง ้น พิมพ์จำหน่ จาก IPายAddress แจกจ่า: ย110.164.194.141 โดยไม่ได้รับอนุญาต", "เรื่องฯ (ระเบียบฯ และแนวทางปฏิบัติ) อย่าง ต่อเนื่อง 2) พัฒนา/ถ่ายทอด/บริหารจัดการองค์ความรู้ ในการวิเคราะห์เรื่องเสนอคณะรัฐมนตรีและการ จัดทำร่างมติคณะรัฐมนตรี 3) เสริมสร้าง/พัฒนาเทคโนโลยีและแนว ปฏิบัติในการจัดประชุมคณะรัฐมนตรี 4) จัดทำและปรับปรุงคู่มือการปฏิบัติงาน"]}, {"name": "พ.ร.บ.ระเบียบบริหารราชการแผ่นดิน พ.ศ. 2534", "paragraphs": ["การจัดระเบียบบริหารราชการแผ่นดิน", "ส่วนกลาง (รวมอำนาจ)                            ส่วนภูมิภาค (แบ่งอำนาจ)                       ส่วนท้องถิ่น (กระจายอำนาจ)", "สำนักนายกรัฐมนตรี                                                                                                 อบจ. จังหวัด                        อำเภอ กระทรวง                                                                                                   เทศบาล", "กรม                             มีฐานนะเป็นนิติบุคคล สุขาภิบาล (ไม่มีแล้ว)", "ทบวง                                                                                                   ราชการส่วนท้องถิ่น อื่นตามที่กฎหมาย การแบ่งส่วนราชการ กำหนดตำแหน่งและอัตราเงินเดือนโดยคำนึงถึง คุณภาพและ                                                           กำหนด ปริมาณงาน ส่วนที่ 1 การจัดระเบียบบริหารราชการส่วนกลาง", "มาตรา 5 การแบ่งราชการออกเป็นส่วนต่า ง ๆ ให้กำหนดตำแหน่งและอัต ราเงินเดือ นโดย คำนึงถึงคุณภาพและปริมาณงานของส่วนราชการนั้น ๆ มาตรา 6 ให้นายกรัฐมนตรีรักษาการตามพระราชบัญญัตินี้ มาตรา 7 ให้จัดระเบียบบริหารราชการส่วนกลาง ดังนี้ หน่วยงานทั้งหมดนี้มีฐานะเป็นนิติบุคคล - สำนักนายกรัฐมนตรี มีฐานะ = กระทรวง - ทบวง สังกัด สำนักนายกรัฐมนตรี / กระทรวง - กระทรวง/ทบวง มีฐานะเทียบเท่า = กระทรวง - กรม/เรียกชื่อ อย่า งอื่น/มีฐ านะเป็น กรม สังกัด หรือไม่สัง กัด สำนักนายกรัฐ มนตรี กระทรวง/ทบวง สรุปสาระสำคัญพระราชบัญญัติระเบียบบริหารราชการแผ่นดิน พ.ศ. 2534 และที่แก้ไข                             45 เพิ่มเติม (ฉบับที่ 8) พ.ศ. 2553 มาตรา 8 การจัดตั้ง การรวม การโอนส่วนราชการ", "จัดตั้ง/รวม/โอน                                 กำหนดตำแหน่ง กระทรวง/ทบวง/กรม                                                                               พระราชบัญญัติ เพิ่ม", "ไม่ได้กำหนด ตำแหน่งเพิ่ม", "การเปลี่ยนชื่อ/ยุบ                                                                           พระราชกฤษฎีกา กระทรวง/ทบวง/กรม", "การจัดตั้ง กรม ซึ่งไม่สังกัดสำนักนายกรัฐมนตรี กระทรวง ทบวง ให้ระบุ “ ไม่สังกัด”ไว้ใน พระราชบัญญัติด้วย ให้สำนักงานคณะกรรมการข้าราชการพลเรือน และสำนักงบประมาณ มีหน้าที่ ตรวจสอบ ดูแล มิให้มีการกำหนดตำแหน่งหรืออัตราของข้าราชการหรือลูกจ้างที่จัดตั้งเพิ่มขึ้นจนกว่าจะครบ กำหนด 3 ปี นับตั้งแต่วันที่มีผลบังคับใช้ของพระราชกฤษฎีกา การยุบส่วนราชการ - ให้งบประมาณรายจ่ายที่เหลืออยู่ของส่วนราชการนั้นยุติลง - ส่วนราชการ จะรับโอนข้าราชการ/ลูกจ้าง ต้องทำภายใน 30 วัน - ทรั พ ย์ ส ิ น อื ่ น ให้ ด ำเนิ น การโอนให้ แ ก่ ส ่ ว นราชการอื ่ น โดยความเห็ น ชอบของ คณะรัฐมนตรี - ข้าราชการที่พ้นจากราชการ สาเหตุถูกยุบตำแหน่ง ต้องได้รับเงินชดเชย ตามที่พระราช กฤษฎีกากำหนด การแบ่งส่วนราชการ - ภายในสำนั ก งานรัฐ มนตรี กรม/ส่ ว นราชการอื ่ น ที ่ ม ีฐ านะเป็น กรม ให้ อ อกเป็น กฎกระทรวง กุล เท่ดัานัดแปลง ้น พิมพ์จำหน่ จาก IPายAddress แจกจ่า: ย110.164.194.141 โดยไม่ได้รับอนุญาต", "- สำนักงานคณะกรรมการข้าราชการพลเรือน/สำนักงบประมาณ การแบ่งส่วนราชการ ภายใน การกำหนดอำนาจหน้าที่ของแต่ละส่วนราชการ ต้องร่วมกันเสนอความเห็นต่อคณะรัฐมนตรี สำนักงบประมาณ เสนอจัดสรรเงินงบประมาณให้สอดคล้อง - สำนักงานคณะกรรมการข้าราชการพลเรือน เสนอการจัดอัตรากำลังของข้าราชการ/ ลูกจ้าง - การแบ่งส่วนราชการภายในมหาวิทยาลัย/สถาบันในทบวงมหาวิทยาลัยให้เ ป็น ไปตาม กฎหมายว่าด้วยมหาวิทยาลัย บั ญญัติ นี้ และให้มีอำนาจออกระเบียบเพื่อปฏิบัติการให้เป็นไปตามพระราชบัญญัตินี้ หมวด 1 บททั่วไป มาตรา 6 การจัดทำงบประมาณ การบริหารงบประมาณรายจ่าย การควบคุมงบประมาณและ การประเมินผลและการรายงาน ต้องปฏิบัติตามพระราชบัญญัตินี้และสอดคล้องกับกฎหมายว่าด้ วยวินัย การเงินการคลังของรัฐ มาตรา 7 ให้หน่วยรับงบประมาณใช้จ่ายงบประมาณตามกฎหมายว่าด้วยงบประมาณรายจ่ าย อย่างเคร่งครัด โดยต้องเป็นไปอย่างมีประสิทธิภาพสูงสุดเพื่อประโยชน์ของประเทศชาติและประชาชนเป็น สำคัญ การโอนงบประมาณรายจ่ า ย ให้ ก ระทำได้ เ ฉพาะกรณี ม ี ความจำเป็ นตามที่ ก ำหนดไว้ใน พระราชบัญญัตินี้เท่านั้น มาตรา 8 ให้รัฐมนตรี รัฐมนตรีเจ้าสังกัด หรือรัฐมนตรีซึ่งกฎหมายกำหนดให้มีหน้ าที่ ก ำกับ หรือ ควบคุมกิจการของหน่วยรับงบประมาณ หรือรัฐมนตรีผู้รักษาการตามกฎหมาย ผู้อำนวยการ และหัวหน้า หน่วยรับงบประมาณควบคุมการใช้จ่ายงบประมาณให้เป็นไปอย่างโปร่งใสและตรวจสอบได้ และให้มี การ ติดตาม ตรวจสอบ และประเมินผลการดำเนินงานเพื่อให้การใช้จ่ายงบประมาณเกิดผลสัมฤทธิ์สูงสุด มาตรา 9 เพื่อประโยชน์เกี่ยวกับการงบประมาณ ให้หัวหน้าหน่วยรับงบประมาณมอบหมาย ผู้บริหารของหน่วยรับงบประมาณคนใดคนหนึ่งรับผิดชอบประสานงานเกี่ยวกับงบประมาณของหน่วยรับ งบประมาณนั้น โดยให้แจ้งสำนักงบประมาณทราบด้วย หมวด 2 ลักษณะของงบประมาณ มาตรา 10 งบประมาณประจำปีที่เสนอต่อรัฐสภา อย่างน้อยต้องมีเอกสารประกอบ ดังต่อไปนี้ (1) คำแถลงประกอบงบประมาณแสดงฐานะและนโยบายการคลังและการเงิน สาระสำคัญของ งบประมาณ และความสัมพันธ์ระหว่างรายรับและงบประมาณรายจ่ายที่ขอตั้ง (2) รายรับรายจ่ายเปรียบเทียบระหว่างปีที่ล่วงมาแล้ว ปีปัจ จุบัน และปีที่ขอตั้งงบประมาณ รายจ่าย (3) คำอธิบายเกี่ยวกับประมาณการรายรับ (4) คำชี้แจงเกี่ยวกับงบประมาณรายจ่ายที่ขอตั้ง ซึ่งรวมถึงการแสดงผลสัมฤทธิ์และประโยชน์ ที่ คาดว่าจะได้รับจากการใช้จ่ายงบประมาณ และความสอดคล้องกับยุทธศาสตร์ชาติ (5) รายงานเกี่ยวกับสถานะทางการเงินโดยรวมของรัฐวิสาหกิจ (6) รายงานเกี่ยวกับสถานะเงินนอกงบประมาณและแผนการใช้จ่ายเงินนอกงบประมาณโดยรวม ของหน่วยรับงบประมาณ พระราชบัญญัติวิธีการงบประมาณ พ.ศ. 2561          105", "(7) คำอธิบายเกี่ยวกับหนี้ของรัฐบาลทั้งที่มีอยู่แล้วในปัจจุบันและหนี้ที่เสนอเพิ่มเติม (8) ผลการดำเนินงานและการใช้จ่ายงบประมาณของปีงบประมาณที่ล่วงมาแล้ว (9) ร่างพระราชบัญญัติงบประมาณรายจ่ายประจำปี มาตรา 11 ในการเสนองบประมาณต่อรัฐสภานั้น ถ้าประมาณการรายรับประเภทรายได้ต ามที่มี กฎหมายให้อำนาจจัดเก็บอยู่แล้วเป็นจำนวนต่ำกว่างบประมาณรายจ่ายทั้งสิ้นที่ขอตั้ง ให้แถลงวิธีหาเงิน ส่วนที่ขาดดุลต่อรัฐสภาด้วย แต่ถ้าเป็นจำนวนสูงกว่าก็ให้แถลงวิธีที่จะจัดการแก่ส่วนที่เกินดุลนั้นด้วย ในกรณีที่ต้องมีการกู้เงินเพื่อชดเชยการขาดดุลงบประมาณ ให้เป็นไปตามหลักเกณฑ์ที่บัญ ญัติไว้ ในกฎหมายว่าด้วยวินัยการเงินการคลังของรัฐและกฎหมายว่าด้วยการบริหารหนี้สาธารณะ มาตรา 12 ในกรณีที่พระราชบัญญัติงบประมาณรายจ่ายประจำปีออกใช้ไม่ทันปีงบประมาณ ใหม่ให้ใช้งบประมาณรายจ่ายประจำปีงบประมาณที่ล่วงแล้วไปพลางก่อนได้ ทั้งนี้ ตามหลักเกณฑ์และ เงื่อนไขที่ผู้อำนวยการกำหนดโดยอนุมัตินายกรัฐมนตรี มาตรา 13 การเสนองบประมาณรายจ่ า ยเพิ่ มเติ ม ต่อ รั ฐ สภา ให้ ค ณะรั ฐ มนตรี เ สนอร่าง พระราชบัญญัติง บประมาณรายจ่ายเพิ่ม เติม โดยให้แสดงเหตุผลและเงินที่พ ึงได้มาสำหรับจ่า ยตาม งบประมาณรายจ่ ายเพิ่ มเติม ที่ ขอตั ้งด้ วยวิ ธีก ารจัดทำงบประมาณรายจ่ ายเพิ่ม เติม ให้เป็นไปตามที่ ผู้อำนวยการกำหนด มาตรา 14 งบประมาณรายจ่ายที่กำหนดในพระราชบัญญัติงบประมาณรายจ่ายประจำปี ห รือ พระราชบัญญัติงบประมาณรายจ่ายเพิ่มเติม อาจจำแนกได้ดังต่อไปนี้ (1) งบประมาณรายจ่ายงบกลาง (2) งบประมาณรายจ่ายของหน่วยรับงบประมาณ (3) งบประมาณรายจ่ายบูรณาการ (4) งบประมาณรายจ่ายบุคลากร (5) งบประมาณรายจ่ายสำหรับทุนหมุนเวียน (6) งบประมาณรายจ่ายเพื่อการชำระหนี้ภาครัฐ (7) งบประมาณรายจ่ายเพื่อชดใช้เงินคงคลัง (8) งบประมาณรายจ่ายเพื่อชดใช้เงินทุนสำรองจ่าย การจำแนกรายจ่ายใดเป็นงบประมาณรายจ่ายตามประเภทที่กำหนดในวรรคหนึ่ง ให้เป็นไป ตามที่ผู้อำนวยการกำหนด มาตรา 15 งบประมาณรายจ่ายงบกลาง ได้แก่ งบประมาณรายจ่ายที่ต ั้งไว้เพื่อจัดสรรให้แก่ หน่วยรับงบประมาณใช้จ่าย โดยแยกต่างหากจากงบประมาณรายจ่ายของหน่วยรับงบประมาณ และให้มี รายการเงินสำรองจ่ายเพื่อกรณีฉุกเฉินหรือจำเป็นด้วย มาตรา 16 งบประมาณรายจ่ายบูรณาการ ได้แก่ งบประมาณรายจ่ายที่ตั้งไว้ส ำหรับ แผนงาน บูรณาการที่คณะรัฐมนตรีอนุมัติ โดยมีหน่วยรับงบประมาณตั้งแต่สองหน่วยขึ้นไปร่วมกันรับผิด ชอบ กุล เท่ดัานัดแปลง ้น พิมพ์จำหน่ จาก IPายAddress แจกจ่า: ย110.164.194.141 โดยไม่ได้รับอนุญาต"]}, {"name": "พ.ร.บ.วินัยการเงินการคลังของรัฐ พ.ศ. 2561", "paragraphs": ["“ทุนหมุนเวียน” หมายความว่า กองทุน กองทุนหมุนเวียน เงินทุน เงินทุนหมุนเวียน ทุน หรือ ทุนหมุนเวียน ที่ตั้งขึ้นเพื่อกิจการที่อนุญาตให้นำรายรับสมทบทุนไว้ใช้จ่ายได้โดยไม่ต้องนำส่งคลั ง “องค์กรปกครองส่วนท้องถิ่น” หมายความว่า องค์การบริหารส่วนจังหวัด เทศบาลองค์การ บริหารส่วนตำบล กรุงเทพมหานคร เมืองพัทยา และองค์กรปกครองส่วนท้องถิ่นอื่นที่มีกฎหมายจัดตั้ง “เงินนอกงบประมาณ” หมายความว่า บรรดาเงินทั้งปวงที่หน่วยงานของรัฐจัดเก็บ หรือได้รับไว้ เป็นกรรมสิทธิ์ตามกฎหมาย ระเบียบ ข้อบังคับ หรือจากนิติกรรมหรือนิติเหตุ หรือกรณีอื่นใด ที่ต้องนำส่ง คลัง แต่มีกฎหมายอนุญาตให้สามารถเก็บไว้ใช้จ่ายได้โดยไม่ต้องนำส่งคลัง “หนี้สาธารณะ” หมายความว่า หนี้สาธารณะตามกฎหมายว่าด้วยการบริหารหนี้สาธารณะ “คลัง” หมายความว่า ที่เก็บรักษาเงินแผ่นดินของกระทรวงการคลัง และให้หมายความรวมถึ ง บัญชีเงินฝากที่ธนาคารแห่งประเทศไทยเพื่อการนี้ด้วย “คณะกรรมการ” หมายความว่า คณะกรรมการนโยบายการเงินการคลังของรัฐ “กรรมการ” หมายความว่า กรรมการนโยบายการเงินการคลังของรัฐ “รัฐมนตรี” หมายความว่า รัฐมนตรีว่าการกระทรวงการคลัง มาตรา 5 ให้นายกรัฐมนตรีและรัฐมนตรีว่าการกระทรวงการคลังรักษาการตามพระราชบั ญญั ติ นี้ และให้มีอำนาจออกระเบียบและประกาศเพื่อปฏิบัติการตามพระราชบัญญัตินี้ ระเบียบและประกาศ เมื่อประกาศในราชกิจจานุเบกษาแล้วให้ใช้บังคับได้ หมวด 1 บททั่วไป มาตรา 6 รัฐต้องดำเนินนโยบายการคลัง การจัดทำงบประมาณ การจัด หารายได้การใช้จ่าย การบริหารการเงินการคลัง และการก่อหนี้ อย่างมีประสิทธิภาพ โปร่งใสและตรวจสอบได้ ทั้งนี้ ตาม หลักการรักษาเสถียรภาพและการพัฒนาทางเศรษฐกิจ อย่างยั่งยืน และหลักความเป็นธรรมในสังคมและ ต้องรักษาวินัยการเงินการคลังตามที่บัญญัต ิในพระราชบัญญัตินี้และตามกฎหมายอื่นที่เกี่ยวข้องอย่าง เคร่งครัด มาตรา 7 การกู้เงิน การลงทุน การตรากฎหมาย การออกกฎ หรือการดำเนินการใด ของรัฐที่มี ผลผูกพันทรัพย์สินหรือก่อให้เกิดภาระทางการเงินการคลังแก่รัฐ ต้องพิจ ารณาความคุ้มค่าต้นทุน และ ผลประโยชน์ เสถียรภาพและความมั่นคงทางเศรษฐกิจและสังคม ตลอดจนความยั่งยืนทางการคลังของรัฐ ด้วย มาตรา 8 รัฐพึงเสริมสร้างวินัยให้ประชาชนเสียภาษีอากรให้ครบถ้วนตามกฎหมาย มาตรา 9 คณะรัฐมนตร
